<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>大蜜蜂</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>大蜜蜂</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">采集花蜜</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g94Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g94Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let bee = {x:W/2, y:H/2};
        let flowers = [];
        let clouds = [];
        let time = 60;
        
        for(let i=0;i<8;i++) flowers.push({x:Math.random()*350+25,y:Math.random()*200+50,hasNectar:true});
        for(let i=0;i<5;i++) clouds.push({x:Math.random()*W,y:Math.random()*80,s:30+Math.random()*20});
        
        function draw() {
            ctx.fillStyle='#87CEEB';
            ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle='rgba(255,255,255,0.8)';
            clouds.forEach(c=>{ctx.beginPath();ctx.arc(c.x,c.y,c.s,0,Math.PI*2);ctx.fill();});
            
            flowers.forEach(f=>{
                if(f.hasNectar){
                    ctx.fillStyle='#228B22';ctx.fillRect(f.x-2,f.y,4,15);
                    ctx.fillStyle=['#FF6B6B','#4ECDC4','#FFEAA7','#96CEB4'][Math.floor(Math.random()*4)];
                    ctx.beginPath();ctx.arc(f.x,f.y,12,0,Math.PI*2);ctx.fill();
                    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(f.x,f.y,5,0,Math.PI*2);ctx.fill();
                }
            });
            
            ctx.fillStyle='#FFD700';
            ctx.beginPath();ctx.ellipse(bee.x,bee.y,15,10,0,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#000';
            ctx.fillRect(bee.x-8,bee.y-3,4,6);ctx.fillRect(bee.x+4,bee.y-3,4,6);
            ctx.fillStyle='rgba(255,255,255,0.7)';
            ctx.beginPath();ctx.ellipse(bee.x-10,bee.y-8,8,5,-0.5,0,Math.PI*2);ctx.ellipse(bee.x+10,bee.y-8,8,5,0.5,0,Math.PI*2);ctx.fill();
            
            ctx.fillStyle='#000';ctx.font='16px Arial';
            ctx.fillText('时间: '+time+'s | 花蜜: '+score,10,25);
        }
        
        function update() {
            clouds.forEach(c=>{c.x+=0.5;if(c.x>W+50)c.x=-50;});
            flowers.forEach(f=>{
                if(f.hasNectar&&Math.abs(bee.x-f.x)<20&&Math.abs(bee.y-f.y)<20){
                    f.hasNectar=false;addScore(10);
                    setTimeout(()=>{f.x=Math.random()*350+25;f.y=Math.random()*200+50;f.hasNectar=true;},3000);
                }
            });
        }
        
        function initGame(){
            bee={x:W/2,y:H/2};flowers=[];time=60;
            for(let i=0;i<8;i++)flowers.push({x:Math.random()*350+25,y:Math.random()*200+50,hasNectar:true});
            if(animationId)cancelAnimationFrame(animationId);
            if(window.timer)clearInterval(window.timer);
            window.timer=setInterval(()=>{if(gameRunning){time--;if(time<=0){messageDisplay.textContent='时间到! 采集: '+score;gameOver();}}},1000);
            gameLoop();
        }
        
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft')bee.x=Math.max(15,bee.x-8);
            if(e.key==='ArrowRight')bee.x=Math.min(W-15,bee.x+8);
            if(e.key==='ArrowUp')bee.y=Math.max(15,bee.y-8);
            if(e.key==='ArrowDown')bee.y=Math.min(H-15,bee.y+8);
        });
        document.getElementById('leftBtn').onclick=()=>bee.x=Math.max(15,bee.x-8);
        document.getElementById('rightBtn').onclick=()=>bee.x=Math.min(W-15,bee.x+8);
        document.getElementById('upBtn').onclick=()=>bee.y=Math.max(15,bee.y-8);
        document.getElementById('downBtn').onclick=()=>bee.y=Math.min(H-15,bee.y+8);
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
