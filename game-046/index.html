<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮盘赌</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>轮盘赌</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>押注颜色</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        let spinning = false;
        let result = null;
        let bet = null;
        
        const wheel = document.createElement('div');
        wheel.style.cssText = 'width:150px;height:150px;border-radius:50%;background:conic-gradient(red 0deg 18deg,black 18deg 36deg,red 36deg 54deg,black 54deg 72deg);margin:15px auto;border:5px solid #8b4513;';
        
        const resultDiv = document.createElement('div');
        resultDiv.style.cssText = 'font-size:24px;margin:10px;';
        
        const btns = document.createElement('div');
        btns.style.cssText = 'display:flex;gap:10px;justify-content:center;margin:15px;';
        
        ['红','黑'].forEach(color => {
            const btn = document.createElement('button');
            btn.textContent = color;
            btn.style.background = color==='红'?'#e74c3c':'#333';
            btn.onclick = () => { bet = color; messageDisplay.textContent = '押注: ' + color; };
            btns.appendChild(btn);
        });
        
        const spinBtn = document.createElement('button');
        spinBtn.textContent = '旋转';
        spinBtn.onclick = () => {
            if(!bet) { messageDisplay.textContent = '先选择押注!'; return; }
            const r = Math.floor(Math.random()*37);
            result = r===0?'绿':(r%2?'红':'黑');
            resultDiv.textContent = '结果: ' + r + ' (' + result + ')';
            if(result === bet) { messageDisplay.textContent = '赢了!'; addScore(20); }
            else messageDisplay.textContent = '输了!';
            bet = null;
        };
        btns.appendChild(spinBtn);
        
        document.querySelector('.game-area').appendChild(wheel);
        document.querySelector('.game-area').appendChild(resultDiv);
        document.querySelector('.game-area').appendChild(btns);
    
    </script>
</body>
</html>
