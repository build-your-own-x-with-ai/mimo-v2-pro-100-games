<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>乒乓球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>控制球拍回击</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const table = document.createElement('div');
        table.style.cssText = 'width:300px;height:180px;background:#2980b9;border-radius:10px;margin:15px auto;position:relative;';
        
        let ballX = 140, ballY = 90, ballDX = 3, ballDY = 2;
        let paddleY = 70;
        let hits = 0;
        
        function render() {
            table.innerHTML = '';
            const ball = document.createElement('div');
            ball.style.cssText = 'position:absolute;left:'+ballX+'px;top:'+ballY+'px;width:15px;height:15px;background:white;border-radius:50%;';
            table.appendChild(ball);
            
            const paddle = document.createElement('div');
            paddle.style.cssText = 'position:absolute;left:10px;top:'+paddleY+'px;width:10px;height:50px;background:#e74c3c;border-radius:5px;';
            table.appendChild(paddle);
        }
        
        setInterval(() => {
            ballX += ballDX;
            ballY += ballDY;
            
            if(ballY < 0 || ballY > 165) ballDY = -ballDY;
            if(ballX > 285) ballDX = -ballDX;
            
            if(ballX < 25 && ballY >= paddleY && ballY <= paddleY + 50) {
                ballDX = Math.abs(ballDX);
                hits++;
                addScore(5);
                messageDisplay.textContent = '回击! ' + hits + '次';
            }
            
            if(ballX < 0) {
                ballX = 140; ballY = 90; hits = 0;
                messageDisplay.textContent = '失分!';
            }
            render();
        }, 30);
        
        document.addEventListener('mousemove', e => {
            const rect = table.getBoundingClientRect();
            paddleY = Math.max(0, Math.min(130, e.clientY - rect.top - 25));
        });
        
        render();
        document.querySelector('.game-area').appendChild(table);
    
    </script>
</body>
</html>
