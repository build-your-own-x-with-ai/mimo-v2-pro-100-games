<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>乒乓球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>控制球拍回击</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const table = document.createElement('div');
        table.style.cssText = 'width:400px;height:300px;background:#2980b9;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        let ballX = 200, ballY = 150, ballDX = 4, ballDY = 3;
        let paddleY = 125;
        let hits = 0;
        let speed = 1;
        const paddleWidth = 10, paddleHeight = 60;
        const ballSize = 15;
        const tableWidth = 400, tableHeight = 300;
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;width:'+ballSize+'px;height:'+ballSize+'px;background:white;border-radius:50%;';
        table.appendChild(ball);
        
        const paddle = document.createElement('div');
        paddle.style.cssText = 'position:absolute;left:10px;width:'+paddleWidth+'px;height:'+paddleHeight+'px;background:#e74c3c;border-radius:5px;';
        table.appendChild(paddle);
        
        const scoreText = document.createElement('div');
        scoreText.style.cssText = 'position:absolute;top:10px;right:10px;color:white;font-size:16px;';
        table.appendChild(scoreText);
        
        function update() {
            ballX += ballDX * speed;
            ballY += ballDY * speed;
            
            if(ballY < 0 || ballY > tableHeight - ballSize) {
                ballDY = -ballDY;
                ballY = Math.max(0, Math.min(tableHeight - ballSize, ballY));
            }
            
            if(ballX > tableWidth - ballSize - 10) {
                ballDX = -ballDX;
                ballX = tableWidth - ballSize - 10;
            }
            
            if(ballX < paddleWidth + 10 && ballY + ballSize > paddleY && ballY < paddleY + paddleHeight) {
                ballDX = Math.abs(ballDX);
                hits++;
                addScore(10);
                speed = Math.min(speed + 0.1, 3);
                const hitPos = (ballY + ballSize/2 - paddleY) / paddleHeight;
                ballDY = (hitPos - 0.5) * 8;
                messageDisplay.textContent = '回击! ' + hits + '次';
            }
            
            if(ballX < 0) {
                ballX = 200; ballY = 150; hits = 0; speed = 1;
                ballDX = 4; ballDY = 3;
                messageDisplay.textContent = '失分!';
            }
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
            paddle.style.top = paddleY + 'px';
            scoreText.textContent = '分数: ' + score;
        }
        
        setInterval(update, 20);
        
        document.addEventListener('mousemove', e => {
            const rect = table.getBoundingClientRect();
            paddleY = Math.max(0, Math.min(tableHeight - paddleHeight, e.clientY - rect.top - paddleHeight/2));
        });
        
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') paddleY = Math.max(0, paddleY - 20);
            if(e.key === 'ArrowDown') paddleY = Math.min(tableHeight - paddleHeight, paddleY + 20);
        });
        
        document.querySelector('.game-area').appendChild(table);
    
    </script>
</body>
</html>
