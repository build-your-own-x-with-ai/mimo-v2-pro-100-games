<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路径规划</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:500px; width:90%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
        input { border-radius:5px; border:1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>路径规划</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>找到最短路径</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const size = 5;
        let grid = [];
        for(let i=0;i<size*size;i++) grid.push(Math.random()>0.2 ? 0 : 1);
        grid[0] = 0;
        grid[size*size-1] = 0;
        
        let player = 0;
        let path = [0];
        
        const board = document.createElement('div');
        board.style.cssText = 'display:grid;grid-template-columns:repeat('+size+',40px);gap:2px;margin:15px auto;width:fit-content;';
        
        function render() {
            board.innerHTML = '';
            grid.forEach((g,i) => {
                const cell = document.createElement('div');
                cell.style.cssText = 'width:40px;height:40px;background:' + (g?'#34495e':(i===size*size-1?'#2ecc71':(path.includes(i)?'#e74c3c':'#3498db'))) + ';border-radius:5px;cursor:pointer;';
                cell.textContent = i===0?'S':(i===size*size-1?'E':'');
                cell.onclick = () => {
                    const row = Math.floor(i/size), col = i%size;
                    const pRow = Math.floor(player/size), pCol = player%size;
                    if(!g && Math.abs(row-pRow)+Math.abs(col-pCol)===1) {
                        player = i;
                        path.push(i);
                        render();
                        if(i===size*size-1) messageDisplay.textContent = '到达终点!';
                    }
                };
                board.appendChild(cell);
            });
        }
        
        render();
        document.querySelector('.game-area').appendChild(board);
    
    </script>
</body>
</html>
