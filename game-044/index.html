<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纸牌记忆</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>纸牌记忆</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>翻开纸牌找到配对</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const symbols = ['♠','♥','♦','♣','★','♪','☀','☁'];
        let cards = [...symbols, ...symbols].sort(() => Math.random()-0.5);
        let flipped = [], matched = [];
        
        const boardDiv = document.createElement('div');
        boardDiv.style.cssText = 'display:grid;grid-template-columns:repeat(4,55px);gap:5px;margin:10px auto;width:fit-content;';
        
        function render() {
            boardDiv.innerHTML = '';
            cards.forEach((sym, i) => {
                const card = document.createElement('div');
                card.style.cssText = 'width:55px;height:65px;background:'+(flipped.includes(i)||matched.includes(i)?'white':'linear-gradient(135deg,#3498db,#2980b9)')+';border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;color:#333;';
                card.textContent = (flipped.includes(i)||matched.includes(i)) ? sym : '?';
                card.onclick = () => {
                    if(flipped.length<2 && !flipped.includes(i) && !matched.includes(i)) {
                        flipped.push(i);
                        if(flipped.length===2) {
                            setTimeout(() => {
                                if(cards[flipped[0]]===cards[flipped[1]]) {
                                    matched.push(...flipped);
                                    addScore(20);
                                    if(matched.length===16) messageDisplay.textContent = '恭喜完成!';
                                }
                                flipped = [];
                                render();
                            }, 500);
                        }
                        render();
                    }
                };
                boardDiv.appendChild(card);
            });
        }
        
        render();
        document.querySelector('.game-area').appendChild(boardDiv);
    
    </script>
</body>
</html>
