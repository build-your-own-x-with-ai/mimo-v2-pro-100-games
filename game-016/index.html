<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字推理</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:500px; width:90%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
        input { border-radius:5px; border:1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>数字推理</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>找出下一个数字</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const sequences = [
            [2,4,6,8],      // +2
            [1,2,4,8],      // x2
            [1,4,9,16],     // 平方
            [1,1,2,3,5,8],  // 斐波那契
            [3,6,9,12],     // +3
        ];
        const answers = [10, 16, 25, 13, 15];
        
        let current = Math.floor(Math.random()*sequences.length);
        const seq = sequences[current];
        
        const display = document.createElement('div');
        display.style.cssText = 'font-size:28px;margin:20px;letter-spacing:15px;';
        display.textContent = seq.join(', ') + ', ?';
        
        const input = document.createElement('input');
        input.type = 'number';
        input.style.cssText = 'font-size:20px;padding:10px;width:100px;text-align:center;';
        
        const btn = document.createElement('button');
        btn.textContent = '检查';
        btn.onclick = () => {
            if(parseInt(input.value) === answers[current]) {
                messageDisplay.textContent = '正确!';
                addScore(10);
                current = Math.floor(Math.random()*sequences.length);
                display.textContent = sequences[current].join(', ') + ', ?';
                input.value = '';
            } else {
                messageDisplay.textContent = '错误，答案是 ' + answers[current];
            }
        };
        
        document.querySelector('.game-area').appendChild(display);
        document.querySelector('.game-area').appendChild(input);
        document.querySelector('.game-area').appendChild(btn);
    
    </script>
</body>
</html>
