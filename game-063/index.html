<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>篮球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>篮球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>投篮得分</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const court = document.createElement('div');
        court.style.cssText = 'width:400px;height:300px;background:#e67e22;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const hoop = document.createElement('div');
        hoop.style.cssText = 'width:60px;height:40px;border:5px solid white;border-top:none;position:absolute;top:30px;left:170px;border-radius:0 0 30px 30px;';
        court.appendChild(hoop);
        
        const backboard = document.createElement('div');
        backboard.style.cssText = 'position:absolute;top:20px;left:230px;width:10px;height:80px;background:white;';
        court.appendChild(backboard);
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;width:20px;height:20px;background:#f39c12;border-radius:50%;left:190px;top:250px;';
        court.appendChild(ball);
        
        let ballX = 190, ballY = 250, ballVX = 0, ballVY = 0;
        let isDragging = false;
        let dragStartX, dragStartY;
        let shots = 0, made = 0;
        const gravity = 0.2;
        
        function resetBall() {
            ballX = 190; ballY = 250; ballVX = 0; ballVY = 0;
        }
        
        function update() {
            if(!isDragging && (ballVX !== 0 || ballVY !== 0)) {
                ballX += ballVX;
                ballY += ballVY;
                ballVY += gravity;
                
                if(ballY > 280) {
                    resetBall();
                    messageDisplay.textContent = '没进! ' + made + '/' + shots;
                }
                
                if(ballX < 10 || ballX > 380) {
                    ballVX = -ballVX * 0.8;
                }
                
                if(ballX > 230 && ballY < 100) {
                    ballVX = -Math.abs(ballVX) * 0.7;
                    ballX = 225;
                }
                
                if(ballX > 170 && ballX < 230 && ballY > 30 && ballY < 70) {
                    made++;
                    addScore(2);
                    messageDisplay.textContent = '进了! ' + made + '/' + shots;
                    setTimeout(resetBall, 500);
                    ballVX = 0; ballVY = 0;
                }
            }
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }
        
        court.addEventListener('mousedown', e => {
            if(ballVX === 0 && ballVY === 0) {
                isDragging = true;
                const rect = court.getBoundingClientRect();
                dragStartX = e.clientX - rect.left;
                dragStartY = e.clientY - rect.top;
            }
        });
        
        court.addEventListener('mousemove', e => {
            if(isDragging) {
                const rect = court.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = dragStartX - mouseX;
                const dy = dragStartY - mouseY;
                ballX = dragStartX + dx * 0.2;
                ballY = dragStartY + dy * 0.2;
            }
        });
        
        court.addEventListener('mouseup', e => {
            if(isDragging) {
                isDragging = false;
                shots++;
                const rect = court.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                ballVX = (dragStartX - mouseX) * 0.15;
                ballVY = (dragStartY - mouseY) * 0.15;
            }
        });
        
        court.addEventListener('mouseleave', () => {
            if(isDragging) {
                isDragging = false;
            }
        });
        
        setInterval(update, 20);
        document.querySelector('.game-area').appendChild(court);
    
    </script>
</body>
</html>
