<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>橄榄球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>橄榄球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>持球冲锋</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const field = document.createElement('div');
        field.style.cssText = 'width:400px;height:300px;background:#27ae60;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const endZone = document.createElement('div');
        endZone.style.cssText = 'position:absolute;right:0;top:0;width:60px;height:100%;background:#2ecc71;';
        field.appendChild(endZone);
        
        const player = document.createElement('div');
        player.style.cssText = 'position:absolute;left:20px;top:135px;width:30px;height:30px;background:#e74c3c;border-radius:50%;';
        field.appendChild(player);
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;left:10px;top:145px;font-size:20px;';
        ball.textContent = '🏈';
        field.appendChild(ball);
        
        let playerX = 20, playerY = 135;
        let speed = 3;
        let enemies = [];
        const fieldWidth = 400, fieldHeight = 300;
        
        function createEnemy() {
            const enemy = document.createElement('div');
            enemy.style.cssText = 'position:absolute;width:25px;height:25px;background:#3498db;border-radius:50%;';
            enemy.x = fieldWidth;
            enemy.y = Math.random() * (fieldHeight - 25);
            enemy.speed = Math.random() * 2 + 1;
            field.appendChild(enemy);
            enemies.push(enemy);
        }
        
        function update() {
            playerX += speed;
            if(playerX > fieldWidth - 60) {
                addScore(7);
                messageDisplay.textContent = '达阵! 得分+7';
                playerX = 20;
                playerY = 135;
                enemies.forEach(e => e.remove());
                enemies = [];
            }
            
            if(Math.random() < 0.02) {
                createEnemy();
            }
            
            enemies.forEach((enemy, index) => {
                enemy.x -= enemy.speed;
                enemy.style.left = enemy.x + 'px';
                enemy.style.top = enemy.y + 'px';
                
                if(enemy.x < 0) {
                    enemy.remove();
                    enemies.splice(index, 1);
                }
                
                if(Math.abs(playerX - enemy.x) < 30 && Math.abs(playerY - enemy.y) < 30) {
                    messageDisplay.textContent = '被拦截!';
                    playerX = 20;
                    playerY = 135;
                    enemies.forEach(e => e.remove());
                    enemies = [];
                }
            });
            
            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            ball.style.left = (playerX - 10) + 'px';
            ball.style.top = (playerY + 10) + 'px';
        }
        
        setInterval(update, 20);
        
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') playerY = Math.max(0, playerY - speed);
            if(e.key === 'ArrowDown') playerY = Math.min(fieldHeight - 30, playerY + speed);
            if(e.key === 'ArrowLeft') playerX = Math.max(0, playerX - speed);
            if(e.key === 'ArrowRight') playerX = Math.min(fieldWidth - 30, playerX + speed);
        });
        
        document.querySelector('.game-area').appendChild(field);
    
    </script>
</body>
</html>
