<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛车游戏</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>赛车游戏</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>躲避障碍物</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const canvas = document.createElement('canvas');
        canvas.width = 200;
        canvas.height = 300;
        canvas.style.background = '#34495e';
        
        const ctx = canvas.getContext('2d');
        let carX = 80;
        let obstacles = [];
        let running = false;
        
        function draw() {
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0,0,200,300);
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(carX, 250, 40, 40);
            ctx.fillStyle = '#fff';
            obstacles.forEach(o => ctx.fillRect(o.x, o.y, 30, 30));
        }
        
        function update() {
            obstacles.forEach(o => o.y += 5);
            obstacles = obstacles.filter(o => o.y < 300);
            if(Math.random() < 0.05) obstacles.push({x: Math.random()*170, y: -30});
            
            obstacles.forEach(o => {
                if(Math.abs(o.x-carX) < 30 && Math.abs(o.y-250) < 30) {
                    running = false;
                    messageDisplay.textContent = '碰撞! 得分: ' + score;
                }
            });
            addScore(1);
        }
        
        function loop() {
            if(!running) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        document.addEventListener('keydown', e => {
            if(e.key==='ArrowLeft') carX = Math.max(0, carX-10);
            if(e.key==='ArrowRight') carX = Math.min(160, carX+10);
        });
        
        const btn = document.createElement('button');
        btn.textContent = '开始';
        btn.onclick = () => {
            running = true;
            obstacles = [];
            carX = 80;
            score = 0;
            loop();
        };
        
        document.querySelector('.game-area').appendChild(canvas);
        document.querySelector('.game-area').appendChild(btn);
    
    </script>
</body>
</html>
