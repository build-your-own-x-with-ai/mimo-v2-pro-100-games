<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
            user-select: none;
        }
        .cell:hover {
            background: rgba(255,255,255,0.5);
        }
        .cell.fixed {
            background: rgba(255,255,255,0.6);
            cursor: default;
        }
        .cell.selected {
            background: rgba(102, 126, 234, 0.5);
            border: 2px solid rgba(102, 126, 234, 0.8);
        }
        .cell.highlighted {
            background: rgba(255,255,255,0.4);
        }
        .cell[data-value="1"] { color: #e74c3c; }
        .cell[data-value="2"] { color: #3498db; }
        .cell[data-value="3"] { color: #2ecc71; }
        .cell[data-value="4"] { color: #f39c12; }
        .cell[data-value="5"] { color: #9b59b6; }
        .cell[data-value="6"] { color: #1abc9c; }
        .cell[data-value="7"] { color: #e67e22; }
        .cell[data-value="8"] { color: #34495e; }
        .cell[data-value="9"] { color: #c0392b; }
        .number-pad {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 5px;
            margin-bottom: 30px;
        }
        .number-btn {
            padding: 10px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .number-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }
        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .message {
            font-size: 1.3rem;
            margin-top: 20px;
            min-height: 30px;
        }
        .timer {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>数独</h1>
        <div class="timer">时间: <span id="timer">00:00</span></div>
        <div class="game-board" id="gameBoard"></div>
        <div class="number-pad" id="numberPad"></div>
        <button id="newGameBtn">新游戏</button>
        <button id="checkBtn">检查</button>
        <div class="message" id="message"></div>
    </div>

    <script>
        let board = [];
        let solution = [];
        let selectedCell = null;
        let timerInterval = null;
        let seconds = 0;
        
        const gameBoard = document.getElementById('gameBoard');
        const numberPad = document.getElementById('numberPad');
        const timerDisplay = document.getElementById('timer');
        const messageDisplay = document.getElementById('message');
        const newGameBtn = document.getElementById('newGameBtn');
        const checkBtn = document.getElementById('checkBtn');
        
        function generatePuzzle() {
            // 简化的数独生成，实际应该使用更复杂的算法
            const base = [
                [5, 3, 4, 6, 7, 8, 9, 1, 2],
                [6, 7, 2, 1, 9, 5, 3, 4, 8],
                [1, 9, 8, 3, 4, 2, 5, 6, 7],
                [8, 5, 9, 7, 6, 1, 4, 2, 3],
                [4, 2, 6, 8, 5, 3, 7, 9, 1],
                [7, 1, 3, 9, 2, 4, 8, 5, 6],
                [9, 6, 1, 5, 3, 7, 2, 8, 4],
                [2, 8, 7, 4, 1, 9, 6, 3, 5],
                [3, 4, 5, 2, 8, 6, 1, 7, 9]
            ];
            
            // 复制解决方案
            solution = JSON.parse(JSON.stringify(base));
            
            // 创建谜题，移除一些数字
            board = JSON.parse(JSON.stringify(base));
            const cellsToRemove = 40; // 移除40个数字
            
            for (let i = 0; i < cellsToRemove; i++) {
                const row = Math.floor(Math.random() * 9);
                const col = Math.floor(Math.random() * 9);
                if (board[row][col] !== 0) {
                    board[row][col] = 0;
                } else {
                    i--; // 如果已经是空格，重试
                }
            }
        }
        
        function createBoard() {
            gameBoard.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.dataset.value = board[i][j];
                    
                    if (board[i][j] !== 0) {
                        cell.textContent = board[i][j];
                        cell.classList.add('fixed');
                    }
                    
                    cell.addEventListener('click', () => selectCell(cell));
                    gameBoard.appendChild(cell);
                }
            }
        }
        
        function createNumberPad() {
            numberPad.innerHTML = '';
            
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = i;
                btn.addEventListener('click', () => enterNumber(i));
                numberPad.appendChild(btn);
            }
            
            // 添加清除按钮
            const clearBtn = document.createElement('button');
            clearBtn.className = 'number-btn';
            clearBtn.textContent = '×';
            clearBtn.addEventListener('click', () => enterNumber(0));
            numberPad.appendChild(clearBtn);
        }
        
        function selectCell(cell) {
            if (cell.classList.contains('fixed')) return;
            
            // 移除之前的选中状态
            document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
            document.querySelectorAll('.cell.highlighted').forEach(c => c.classList.remove('highlighted'));
            
            // 添加选中状态
            cell.classList.add('selected');
            selectedCell = cell;
            
            // 高亮相同数字的格子
            const value = cell.dataset.value;
            if (value && value !== '0') {
                document.querySelectorAll(`.cell[data-value="${value}"]`).forEach(c => {
                    if (c !== cell) c.classList.add('highlighted');
                });
            }
        }
        
        function enterNumber(num) {
            if (!selectedCell) return;
            
            selectedCell.textContent = num || '';
            selectedCell.dataset.value = num;
            
            // 更新高亮
            document.querySelectorAll('.cell.highlighted').forEach(c => c.classList.remove('highlighted'));
            
            if (num) {
                document.querySelectorAll(`.cell[data-value="${num}"]`).forEach(c => {
                    if (c !== selectedCell) c.classList.add('highlighted');
                });
            }
        }
        
        function checkSolution() {
            let correct = true;
            
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const cell = document.querySelector(`.cell[data-row="${i}"][data-col="${j}"]`);
                    const value = parseInt(cell.dataset.value) || 0;
                    
                    if (value !== solution[i][j]) {
                        correct = false;
                        cell.style.background = 'rgba(231, 76, 60, 0.5)';
                    } else {
                        cell.style.background = '';
                    }
                }
            }
            
            if (correct) {
                messageDisplay.textContent = '恭喜! 你完成了数独!';
                clearInterval(timerInterval);
            } else {
                messageDisplay.textContent = '有错误，请继续尝试!';
            }
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            seconds = 0;
            
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerDisplay.textContent = `${mins}:${secs}`;
            }, 1000);
        }
        
        function initGame() {
            generatePuzzle();
            createBoard();
            createNumberPad();
            startTimer();
            messageDisplay.textContent = '';
            selectedCell = null;
        }
        
        newGameBtn.addEventListener('click', initGame);
        checkBtn.addEventListener('click', checkSolution);
        
        document.addEventListener('keydown', (e) => {
            if (!selectedCell) return;
            
            if (e.key >= '1' && e.key <= '9') {
                enterNumber(parseInt(e.key));
            } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
                enterNumber(0);
            }
        });
        
        // 初始化游戏
        initGame();
    </script>
</body>
</html>
