<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>冰球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>击打冰球入网</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const rink = document.createElement('div');
        rink.style.cssText = 'width:400px;height:300px;background:#ecf0f1;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const playerGoal = document.createElement('div');
        playerGoal.style.cssText = 'position:absolute;left:0;top:100px;width:20px;height:100px;background:#e74c3c;';
        rink.appendChild(playerGoal);
        
        const aiGoal = document.createElement('div');
        aiGoal.style.cssText = 'position:absolute;right:0;top:100px;width:20px;height:100px;background:#3498db;';
        rink.appendChild(aiGoal);
        
        const puck = document.createElement('div');
        puck.style.cssText = 'position:absolute;width:20px;height:20px;background:#2c3e50;border-radius:50%;left:190px;top:140px;';
        rink.appendChild(puck);
        
        const playerStick = document.createElement('div');
        playerStick.style.cssText = 'position:absolute;left:50px;top:130px;width:15px;height:60px;background:#e74c3c;border-radius:5px;';
        rink.appendChild(playerStick);
        
        const aiStick = document.createElement('div');
        aiStick.style.cssText = 'position:absolute;right:50px;top:130px;width:15px;height:60px;background:#3498db;border-radius:5px;';
        rink.appendChild(aiStick);
        
        let puckX = 190, puckY = 140, puckVX = 0, puckVY = 0;
        let playerY = 130, aiY = 130;
        const stickWidth = 15, stickHeight = 60;
        const rinkWidth = 400, rinkHeight = 300;
        const friction = 0.99;
        
        function resetPuck() {
            puckX = 190; puckY = 140; puckVX = 0; puckVY = 0;
        }
        
        function update() {
            puckX += puckVX;
            puckY += puckVY;
            puckVX *= friction;
            puckVY *= friction;
            
            if(Math.abs(puckVX) < 0.1) puckVX = 0;
            if(Math.abs(puckVY) < 0.1) puckVY = 0;
            
            if(puckY < 0 || puckY > rinkHeight - 20) {
                puckVY = -puckVY;
                puckY = Math.max(0, Math.min(rinkHeight - 20, puckY));
            }
            
            if(puckX < stickWidth + 50 && puckY + 20 > playerY && puckY < playerY + stickHeight) {
                puckVX = Math.abs(puckVX) + 2;
                puckVY += (puckY - (playerY + stickHeight/2)) * 0.1;
            }
            
            if(puckX > rinkWidth - stickWidth - 50 - 20 && puckY + 20 > aiY && puckY < aiY + stickHeight) {
                puckVX = -Math.abs(puckVX) - 2;
                puckVY += (puckY - (aiY + stickHeight/2)) * 0.1;
            }
            
            if(puckX < 20 && puckY > 100 && puckY < 200) {
                addScore(10);
                messageDisplay.textContent = 'AI得分!';
                setTimeout(resetPuck, 1000);
                puckVX = 0; puckVY = 0;
            }
            
            if(puckX > rinkWidth - 20 - 20 && puckY > 100 && puckY < 200) {
                addScore(10);
                messageDisplay.textContent = '玩家得分!';
                setTimeout(resetPuck, 1000);
                puckVX = 0; puckVY = 0;
            }
            
            const aiTarget = puckY - stickHeight/2;
            aiY += (aiTarget - aiY) * 0.1;
            aiY = Math.max(0, Math.min(rinkHeight - stickHeight, aiY));
            
            puck.style.left = puckX + 'px';
            puck.style.top = puckY + 'px';
            playerStick.style.top = playerY + 'px';
            aiStick.style.top = aiY + 'px';
        }
        
        setInterval(update, 20);
        
        document.addEventListener('mousemove', e => {
            const rect = rink.getBoundingClientRect();
            playerY = Math.max(0, Math.min(rinkHeight - stickHeight, e.clientY - rect.top - stickHeight/2));
        });
        
        document.querySelector('.game-area').appendChild(rink);
    
    </script>
</body>
</html>
