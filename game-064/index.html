<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>冰球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>击打冰球入网</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const rink = document.createElement('div');
        rink.style.cssText = 'width:280px;height:180px;background:#ecf0f1;border-radius:10px;margin:15px auto;position:relative;';
        
        let puckX = 130, puckY = 80;
        
        function render() {
            rink.innerHTML = '';
            const puck = document.createElement('div');
            puck.style.cssText = 'position:absolute;left:'+puckX+'px;top:'+puckY+'px;width:20px;height:20px;background:#2c3e50;border-radius:50%;';
            rink.appendChild(puck);
            
            const goal = document.createElement('div');
            goal.style.cssText = 'position:absolute;right:0;top:60px;width:20px;height:60px;background:#e74c3c;';
            rink.appendChild(goal);
        }
        
        rink.onclick = (e) => {
            const rect = rink.getBoundingClientRect();
            puckX = Math.max(0, Math.min(260, e.clientX - rect.left - 10));
            puckY = Math.max(0, Math.min(160, e.clientY - rect.top - 10));
            
            if(puckX > 240 && puckY > 60 && puckY < 120) {
                addScore(10);
                messageDisplay.textContent = '进球!';
                puckX = 130; puckY = 80;
            }
            render();
        };
        
        render();
        document.querySelector('.game-area').appendChild(rink);
    
    </script>
</body>
</html>
