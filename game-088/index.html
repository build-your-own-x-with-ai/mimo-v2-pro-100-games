<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>1942</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>1942</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">二战空战射击</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g88Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g88Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let player = {x:W/2, y:H-50, hp:3, power:1};
        let bullets = [];
        let enemies = [];
        let boss = null;
        let wave = 1;
        let clouds = Array(10).fill().map(()=>({x:Math.random()*W,y:Math.random()*H}));
        
        function draw() {
            ctx.fillStyle='#87CEEB';
            ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle='rgba(255,255,255,0.7)';
            clouds.forEach(c => ctx.fillRect(c.x,c.y,40,20));
            
            ctx.fillStyle='#3498db';
            ctx.beginPath();
            ctx.moveTo(player.x,player.y-15);
            ctx.lineTo(player.x-12,player.y+10);
            ctx.lineTo(player.x+12,player.y+10);
            ctx.fill();
            ctx.fillRect(player.x-2,player.y-25,4,10);
            
            ctx.fillStyle='#f1c40f';
            bullets.forEach(b => ctx.fillRect(b.x-2,b.y,4,10));
            
            ctx.fillStyle='#e74c3c';
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.moveTo(e.x,e.y+15);
                ctx.lineTo(e.x-10,e.y-10);
                ctx.lineTo(e.x+10,e.y-10);
                ctx.fill();
            });
            
            if(boss) {
                ctx.fillStyle='#8e44ad';
                ctx.fillRect(boss.x-40,boss.y-20,80,40);
                ctx.fillStyle='#fff';
                ctx.fillRect(boss.hpBar,10,300-boss.hpBar*2,10);
            }
            
            ctx.fillStyle='#fff';
            ctx.fillText('HP: '+'❤️'.repeat(player.hp),10,20);
            ctx.fillText('Wave: '+wave,10,35);
        }
        
        function update() {
            clouds.forEach(c => { c.y+=1; if(c.y>H) c.y=-20; });
            
            bullets.forEach(b => b.y-=8);
            bullets = bullets.filter(b => b.y>0);
            
            if(!boss) {
                if(Math.random()<0.03) enemies.push({x:Math.random()*W,y:-20,hp:1});
                enemies.forEach(e => {
                    e.y+=2;
                    bullets.forEach(b => {
                        if(Math.abs(b.x-e.x)<12&&Math.abs(b.y-e.y)<15) { e.y=H+50; b.y=-50; addScore(20); }
                    });
                    if(Math.abs(player.x-e.x)<15&&Math.abs(player.y-e.y)<15) {
                        e.y=H+50; player.hp--;
                        if(player.hp<=0) gameOver();
                    }
                });
                enemies = enemies.filter(e => e.y<H);
                
                if(enemies.length===0&&Math.random()<0.01) {
                    wave++;
                    if(wave%3===0) boss={x:W/2,y:50,hp:50,hpBar:15};
                    else messageDisplay.textContent='Wave '+wave;
                }
            } else {
                boss.x+=Math.sin(Date.now()/500)*2;
                bullets.forEach(b => {
                    if(Math.abs(b.x-boss.x)<40&&Math.abs(b.y-boss.y)<20) { boss.hp--; b.y=-50; addScore(5); }
                });
                if(boss.hp<=0) { boss=null; addScore(500); messageDisplay.textContent='Boss击败!'; }
            }
        }
        
        function initGame() {
            player={x:W/2,y:H-50,hp:3,power:1}; bullets=[]; enemies=[]; boss=null; wave=1;
            if(animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }
        
        function gameLoop() {
            if(!gameRunning) return;
            update(); draw();
            animationId=requestAnimationFrame(gameLoop);
        }
        
        function fire() { if(gameRunning) bullets.push({x:player.x,y:player.y-25}); }
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft') player.x=Math.max(15,player.x-10);
            if(e.key==='ArrowRight') player.x=Math.min(W-15,player.x+10);
            if(e.key==='ArrowUp') player.y=Math.max(30,player.y-10);
            if(e.key==='ArrowDown') player.y=Math.min(H-20,player.y+10);
            if(e.key===' ') fire();
        });
        document.getElementById('leftBtn').onclick=()=>player.x=Math.max(15,player.x-10);
        document.getElementById('rightBtn').onclick=()=>player.x=Math.min(W-15,player.x+10);
        document.getElementById('upBtn').onclick=()=>player.y=Math.max(30,player.y-10);
        document.getElementById('downBtn').onclick=()=>player.y=Math.min(H-20,player.y+10);
        document.getElementById('fireBtn').onclick=fire;
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
