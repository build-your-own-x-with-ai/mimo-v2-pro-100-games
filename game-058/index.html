<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高尔夫</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>高尔夫</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>挥杆击球入洞</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const course = document.createElement('div');
        course.style.cssText = 'width:500px;height:200px;background:#27ae60;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const hole = document.createElement('div');
        hole.style.cssText = 'position:absolute;right:30px;top:85px;width:30px;height:30px;background:#2c3e50;border-radius:50%;';
        course.appendChild(hole);
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;left:50px;top:90px;width:20px;height:20px;background:white;border-radius:50%;';
        course.appendChild(ball);
        
        let ballX = 50, ballY = 90, ballVX = 0, ballVY = 0;
        let isDragging = false;
        let dragStartX, dragStartY;
        let strokes = 0;
        const friction = 0.98;
        const holeX = 440, holeY = 90;
        
        function resetBall() {
            ballX = 50; ballY = 90; ballVX = 0; ballVY = 0;
        }
        
        function update() {
            if(!isDragging && (ballVX !== 0 || ballVY !== 0)) {
                ballX += ballVX;
                ballY += ballVY;
                ballVX *= friction;
                ballVY *= friction;
                
                if(Math.abs(ballVX) < 0.1 && Math.abs(ballVY) < 0.1) {
                    ballVX = 0; ballVY = 0;
                }
                
                if(ballX < 0 || ballX > 480) {
                    ballVX = -ballVX * 0.8;
                    ballX = Math.max(0, Math.min(480, ballX));
                }
                if(ballY < 0 || ballY > 180) {
                    ballVY = -ballVY * 0.8;
                    ballY = Math.max(0, Math.min(180, ballY));
                }
                
                if(Math.abs(ballX - holeX) < 15 && Math.abs(ballY - holeY) < 15) {
                    strokes++;
                    addScore(Math.max(10, 100 - strokes * 5));
                    messageDisplay.textContent = '进洞! ' + strokes + '杆';
                    strokes = 0;
                    setTimeout(resetBall, 1000);
                    ballVX = 0; ballVY = 0;
                }
            }
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }
        
        course.addEventListener('mousedown', e => {
            if(ballVX === 0 && ballVY === 0) {
                isDragging = true;
                const rect = course.getBoundingClientRect();
                dragStartX = e.clientX - rect.left;
                dragStartY = e.clientY - rect.top;
            }
        });
        
        course.addEventListener('mousemove', e => {
            if(isDragging) {
                const rect = course.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = dragStartX - mouseX;
                const dy = dragStartY - mouseY;
                ballX = dragStartX + dx * 0.1;
                ballY = dragStartY + dy * 0.1;
            }
        });
        
        course.addEventListener('mouseup', e => {
            if(isDragging) {
                isDragging = false;
                strokes++;
                const rect = course.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                ballVX = (dragStartX - mouseX) * 0.1;
                ballVY = (dragStartY - mouseY) * 0.1;
            }
        });
        
        course.addEventListener('mouseleave', () => {
            if(isDragging) {
                isDragging = false;
            }
        });
        
        setInterval(update, 20);
        document.querySelector('.game-area').appendChild(course);
    
    </script>
</body>
</html>
