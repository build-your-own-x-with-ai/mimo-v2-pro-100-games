<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保龄球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>保龄球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>投球击倒球瓶</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const lane = document.createElement('div');
        lane.style.cssText = 'width:300px;height:250px;background:#deb887;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const pinRows = [[0], [-1,1], [-2,0,2], [-3,-1,1,3]];
        let pins = [];
        pinRows.forEach((row, rowIndex) => {
            row.forEach(offset => {
                pins.push({
                    x: 150 + offset * 25,
                    y: 30 + rowIndex * 30,
                    up: true
                });
            });
        });
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;width:20px;height:20px;background:#333;border-radius:50%;left:140px;top:200px;';
        lane.appendChild(ball);
        
        let ballX = 140, ballY = 200, ballDX = 0, ballDY = -3;
        let isThrowing = false;
        
        function render() {
            pins.forEach((pin, index) => {
                let pinElem = document.getElementById('pin' + index);
                if(!pinElem) {
                    pinElem = document.createElement('div');
                    pinElem.id = 'pin' + index;
                    pinElem.style.cssText = 'position:absolute;font-size:20px;transition:transform 0.3s;';
                    pinElem.textContent = '🎳';
                    lane.appendChild(pinElem);
                }
                pinElem.style.left = pin.x + 'px';
                pinElem.style.top = pin.y + 'px';
                if(!pin.up) {
                    pinElem.style.transform = 'rotate(90deg)';
                    pinElem.style.opacity = '0.5';
                }
            });
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }
        
        lane.onclick = () => {
            if(!isThrowing) {
                isThrowing = true;
                ballX = 140; ballY = 200;
                ballDX = (Math.random() - 0.5) * 2;
                ballDY = -3;
            }
        };
        
        function update() {
            if(isThrowing) {
                ballX += ballDX;
                ballY += ballDY;
                
                if(ballX < 0 || ballX > 280) ballDX = -ballDX;
                
                pins.forEach(pin => {
                    if(pin.up && Math.abs(ballX - pin.x) < 20 && Math.abs(ballY - pin.y) < 20) {
                        pin.up = false;
                        addScore(10);
                    }
                });
                
                if(ballY < 10) {
                    isThrowing = false;
                    const knocked = pins.filter(p => !p.up).length;
                    messageDisplay.textContent = '击倒 ' + knocked + ' 个! 得分 +' + knocked * 10;
                    
                    if(!pins.some(p => p.up)) {
                        setTimeout(() => {
                            pins.forEach(p => p.up = true);
                            messageDisplay.textContent = '全中! 重新开始';
                        }, 1000);
                    }
                }
            }
            render();
        }
        
        setInterval(update, 20);
        render();
        document.querySelector('.game-area').appendChild(lane);
    
    </script>
</body>
</html>
