<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找不同</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:30px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:500px; width:90%; }
        h1 { font-size:2rem; margin-bottom:15px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.2); border-radius:10px; padding:20px; margin:20px 0; }
        button { padding:12px 30px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:25px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.2rem; margin-top:15px; min-height:25px; color:#51cf66; }
        .score { font-size:1rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>找不同</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>在两张图片中找出不同之处</p>
            
        <div style="display:flex;gap:20px;justify-content:center;">
            <div id="img1" style="width:150px;height:150px;background:#3498db;border-radius:10px;position:relative;">
                <div class="diff" style="position:absolute;top:20px;left:20px;width:20px;height:20px;background:#e74c3c;border-radius:50%;"></div>
            </div>
            <div id="img2" style="width:150px;height:150px;background:#3498db;border-radius:10px;position:relative;">
                <div class="diff" style="position:absolute;top:20px;left:20px;width:20px;height:20px;background:#2ecc71;border-radius:50%;"></div>
                <div class="diff" style="position:absolute;top:60px;left:80px;width:15px;height:15px;background:#f39c12;border-radius:50%;"></div>
            </div>
        </div>
        <p style="margin-top:20px;">点击右边图片的不同之处</p>
    
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        
        let found = 0;
        const diffs = document.querySelectorAll('#img2 .diff');
        diffs.forEach(d => {
            d.style.cursor = 'pointer';
            d.addEventListener('click', () => {
                if(!d.classList.contains('found')) {
                    d.classList.add('found');
                    d.style.border = '3px solid yellow';
                    found++;
                    if(found === 2) messageDisplay.textContent = '恭喜找到所有不同!';
                }
            });
        });
    
    </script>
</body>
</html>
