<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空侵略者</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:300px; background:rgba(0,0,0,0.3); border-radius:10px; padding:15px; margin:15px 0; }
        canvas { display:block; margin:0 auto; background:#1a1a2e; border-radius:5px; }
        button { padding:10px 25px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; }
        .score { font-size:0.9rem; margin-bottom:10px; }
        .controls { margin-top:10px; }
        .ctrl-btn { width:50px; height:50px; font-size:1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>太空侵略者</h1>
        <div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div>
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="300"></canvas>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="leftBtn">←</button>
            <button class="ctrl-btn" id="upBtn">↑</button>
            <button class="ctrl-btn" id="downBtn">↓</button>
            <button class="ctrl-btn" id="rightBtn">→</button>
            <button class="ctrl-btn" id="fireBtn">射击</button>
        </div>
        <button id="startBtn">开始游戏</button>
        <div class="message" id="message">射击外星人</div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        
        let score = 0;
        let bestScore = localStorage.getItem('game74Best') || 0;
        let gameRunning = false;
        let animationId = null;
        
        bestDisplay.textContent = bestScore;
        
        function addScore(n) {
            score += n;
            scoreDisplay.textContent = score;
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('game74Best', bestScore);
                bestDisplay.textContent = bestScore;
            }
        }
        
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            messageDisplay.textContent = '游戏结束! 得分: ' + score;
            startBtn.textContent = '重新开始';
        }
        
        
        const W=400, H=300; canvas.width=W; canvas.height=H;
        let playerX=W/2, playerY=H-30, bullets=[], enemies=[], enemyDir=1;
        function initEnemies(){enemies=[];for(let r=0;r<3;r++)for(let c=0;c<8;c++)enemies.push({x:c*45+30,y:r*35+30,alive:true});}
        function draw(){
            ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
            ctx.fillStyle='#2ecc71';ctx.fillRect(playerX-15,playerY,30,15);
            bullets.forEach(b=>{ctx.fillStyle='#f1c40f';ctx.fillRect(b.x-2,b.y,4,10);});
            enemies.forEach(e=>{if(e.alive){ctx.fillStyle='#e74c3c';ctx.fillRect(e.x-10,e.y-8,20,16);}});
        }
        function update(){
            bullets.forEach(b=>b.y-=5);bullets=bullets.filter(b=>b.y>0);
            let hit=false;enemies.forEach(e=>{if(e.alive){e.x+=enemyDir;if(e.x>W-20||e.x<20)hit=true;
            bullets.forEach(b=>{if(b.x>e.x-10&&b.x<e.x+10&&b.y>e.y-8&&b.y<e.y+8){e.alive=false;b.y=-10;addScore(10);}});}});
            if(hit){enemyDir=-enemyDir;enemies.forEach(e=>e.y+=10);}
            if(enemies.every(e=>!e.alive)){initEnemies();}
        }
        function initGame(){playerX=W/2;bullets=[];initEnemies();if(animationId)cancelAnimationFrame(animationId);gameLoop();}
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        function fire(){if(gameRunning)bullets.push({x:playerX,y:playerY-10});}
        document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')playerX=Math.max(20,playerX-10);if(e.key==='ArrowRight')playerX=Math.min(W-20,playerX+10);if(e.key===' ')fire();});
        document.getElementById('leftBtn').onclick=()=>playerX=Math.max(20,playerX-10);
        document.getElementById('rightBtn').onclick=()=>playerX=Math.min(W-20,playerX+10);
        document.getElementById('fireBtn').onclick=fire;
    
        
        startBtn.addEventListener('click', () => {
            score = 0;
            scoreDisplay.textContent = score;
            gameRunning = true;
            messageDisplay.textContent = '游戏进行中...';
            startBtn.textContent = '重新开始';
            initGame();
        });
    </script>
</body>
</html>
