<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>足球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>射门得分</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const field = document.createElement('div');
        field.style.cssText = 'width:400px;height:300px;background:#27ae60;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const goalArea = document.createElement('div');
        goalArea.style.cssText = 'position:absolute;top:0;left:100px;width:200px;height:60px;border:3px solid white;border-top:none;';
        field.appendChild(goalArea);
        
        const goalLine = document.createElement('div');
        goalLine.style.cssText = 'position:absolute;top:0;left:100px;width:200px;height:5px;background:white;';
        field.appendChild(goalLine);
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;width:20px;height:20px;background:white;border-radius:50%;left:190px;top:250px;';
        field.appendChild(ball);
        
        const goalkeeper = document.createElement('div');
        goalkeeper.style.cssText = 'position:absolute;width:30px;height:40px;background:#e74c3c;border-radius:5px;left:185px;top:10px;';
        field.appendChild(goalkeeper);
        
        let ballX = 190, ballY = 250, ballVX = 0, ballVY = 0;
        let isDragging = false;
        let dragStartX, dragStartY;
        let shots = 0, goals = 0;
        const gravity = 0.15;
        
        function resetBall() {
            ballX = 190; ballY = 250; ballVX = 0; ballVY = 0;
            goalkeeper.style.left = '185px';
        }
        
        function update() {
            if(!isDragging && (ballVX !== 0 || ballVY !== 0)) {
                ballX += ballVX;
                ballY += ballVY;
                ballVY += gravity;
                
                if(ballY < 5) {
                    if(ballX > 100 && ballX < 300) {
                        const keeperX = parseInt(goalkeeper.style.left);
                        if(ballX < keeperX || ballX > keeperX + 30) {
                            goals++;
                            addScore(10);
                            messageDisplay.textContent = '进球! ' + goals + '/' + shots;
                        } else {
                            messageDisplay.textContent = '被扑出! ' + goals + '/' + shots;
                        }
                    } else {
                        messageDisplay.textContent = '射偏! ' + goals + '/' + shots;
                    }
                    setTimeout(resetBall, 500);
                    ballVX = 0; ballVY = 0;
                }
                
                if(ballX < 0 || ballX > 380) {
                    ballVX = -ballVX * 0.8;
                }
                
                if(ballY > 280) {
                    resetBall();
                }
                
                const keeperX = parseInt(goalkeeper.style.left);
                const targetX = ballX - 15;
                goalkeeper.style.left = Math.max(100, Math.min(270, keeperX + (targetX - keeperX) * 0.05)) + 'px';
            }
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }
        
        field.addEventListener('mousedown', e => {
            if(ballVX === 0 && ballVY === 0) {
                isDragging = true;
                const rect = field.getBoundingClientRect();
                dragStartX = e.clientX - rect.left;
                dragStartY = e.clientY - rect.top;
            }
        });
        
        field.addEventListener('mousemove', e => {
            if(isDragging) {
                const rect = field.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = dragStartX - mouseX;
                const dy = dragStartY - mouseY;
                ballX = dragStartX + dx * 0.2;
                ballY = dragStartY + dy * 0.2;
            }
        });
        
        field.addEventListener('mouseup', e => {
            if(isDragging) {
                isDragging = false;
                shots++;
                const rect = field.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                ballVX = (dragStartX - mouseX) * 0.15;
                ballVY = (dragStartY - mouseY) * 0.15;
            }
        });
        
        field.addEventListener('mouseleave', () => {
            if(isDragging) {
                isDragging = false;
            }
        });
        
        setInterval(update, 20);
        document.querySelector('.game-area').appendChild(field);
    
    </script>
</body>
</html>
