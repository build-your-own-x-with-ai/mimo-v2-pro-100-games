<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>战场之狼</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>战场之狼</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">俯视射击</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g87Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g87Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let player = {x:W/2, y:H/2, angle:0, hp:3};
        let bullets = [];
        let enemies = [];
        let items = [];
        
        function draw() {
            ctx.fillStyle='#27ae60';
            ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle='#f1c40f';
            items.forEach(i => ctx.fillRect(i.x-8,i.y-8,16,16));
            
            ctx.save();
            ctx.translate(player.x,player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle='#3498db';
            ctx.fillRect(-10,-10,20,20);
            ctx.fillStyle='#f39c12';
            ctx.fillRect(8,-3,12,6);
            ctx.restore();
            
            ctx.fillStyle='#f1c40f';
            bullets.forEach(b => ctx.fillRect(b.x-3,b.y-3,6,6));
            
            ctx.fillStyle='#e74c3c';
            enemies.forEach(e => ctx.fillRect(e.x-10,e.y-10,20,20));
            
            ctx.fillStyle='#fff';
            ctx.fillText('HP: '+'❤️'.repeat(player.hp),10,20);
        }
        
        function update() {
            bullets.forEach(b => { b.x+=b.dx; b.y+=b.dy; });
            bullets = bullets.filter(b => b.x>0&&b.x<W&&b.y>0&&b.y<H);
            
            if(Math.random()<0.02) enemies.push({x:Math.random()*W, y:Math.random()<0.5?0:H});
            
            enemies.forEach(e => {
                const dx=player.x-e.x, dy=player.y-e.y;
                const dist=Math.sqrt(dx*dx+dy*dy);
                e.x+=dx/dist*1.5; e.y+=dy/dist*1.5;
                
                bullets.forEach(b => {
                    if(Math.abs(b.x-e.x)<12&&Math.abs(b.y-e.y)<12) { e.x=-100; b.x=-100; addScore(20); }
                });
                
                if(Math.abs(player.x-e.x)<15&&Math.abs(player.y-e.y)<15) {
                    e.x=-100; player.hp--;
                    if(player.hp<=0) gameOver();
                }
            });
            
            enemies = enemies.filter(e => e.x>-50);
            
            items.forEach(i => {
                if(Math.abs(player.x-i.x)<15&&Math.abs(player.y-i.y)<15) { i.x=-100; addScore(50); }
            });
            items = items.filter(i => i.x>-50);
            
            if(Math.random()<0.005) items.push({x:Math.random()*W, y:Math.random()*H});
        }
        
        function initGame() {
            player={x:W/2,y:H/2,angle:0,hp:3}; bullets=[]; enemies=[]; items=[];
            if(animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }
        
        function gameLoop() {
            if(!gameRunning) return;
            update(); draw();
            animationId=requestAnimationFrame(gameLoop);
        }
        
        function fire() {
            if(!gameRunning) return;
            bullets.push({x:player.x,y:player.y,dx:Math.cos(player.angle)*8,dy:Math.sin(player.angle)*8});
        }
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft') player.angle-=0.2;
            if(e.key==='ArrowRight') player.angle+=0.2;
            if(e.key==='ArrowUp') { player.x+=Math.cos(player.angle)*5; player.y+=Math.sin(player.angle)*5; }
            if(e.key===' ') fire();
        });
        document.getElementById('leftBtn').onclick=()=>player.angle-=0.2;
        document.getElementById('rightBtn').onclick=()=>player.angle+=0.2;
        document.getElementById('upBtn').onclick=()=>{player.x+=Math.cos(player.angle)*5;player.y+=Math.sin(player.angle)*5;};
        document.getElementById('fireBtn').onclick=fire;
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
