<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>五子棋</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>五子连珠获胜</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const size = 15;
        let board = Array(size).fill().map(() => Array(size).fill(0));
        let turn = 1;
        
        const boardDiv = document.createElement('div');
        boardDiv.style.cssText = 'display:grid;grid-template-columns:repeat('+size+',22px);gap:1px;background:#c9a050;padding:5px;margin:10px auto;width:fit-content;';
        
        function render() {
            boardDiv.innerHTML = '';
            for(let r=0;r<size;r++) for(let c=0;c<size;c++) {
                const cell = document.createElement('div');
                cell.style.cssText = 'width:22px;height:22px;background:#deb887;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;';
                if(board[r][c]) {
                    cell.innerHTML = '<div style="width:18px;height:18px;border-radius:50%;background:'+(board[r][c]===1?'#333':'#fff')+';"></div>';
                }
                cell.onclick = () => {
                    if(!board[r][c]) {
                        board[r][c] = turn;
                        if(checkWin(r,c,turn)) { messageDisplay.textContent = (turn===1?'黑':'白')+'方获胜!'; addScore(100); }
                        turn = 3-turn;
                        render();
                    }
                };
                boardDiv.appendChild(cell);
            }
        }
        
        function checkWin(r,c,p) {
            const dirs = [[1,0],[0,1],[1,1],[1,-1]];
            for(const [dr,dc] of dirs) {
                let cnt = 1;
                for(let d of [1,-1]) for(let i=1;i<5;i++) {
                    const nr=r+dr*i*d, nc=c+dc*i*d;
                    if(nr>=0&&nr<size&&nc>=0&&nc<size&&board[nr][nc]===p) cnt++;
                }
                if(cnt>=5) return true;
            }
            return false;
        }
        
        render();
        document.querySelector('.game-area').appendChild(boardDiv);
    
    </script>
</body>
</html>
