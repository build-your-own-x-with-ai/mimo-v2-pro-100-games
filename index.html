<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .categories {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .category-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .category-btn:hover, .category-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: white;
            transform: translateY(-2px);
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .game-number {
            font-size: 0.9rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .game-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        .game-category {
            font-size: 0.9rem;
            color: #764ba2;
            margin-bottom: 10px;
        }
        .game-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.4;
        }
        .game-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        const gamesGrid = document.getElementById('gamesGrid');
        const categoryBtns = document.querySelectorAll('.category-btn');

        function renderGames(category = 'all') {
            gamesGrid.innerHTML = '';
            
            const filteredGames = category === 'all' 
                ? games 
                : games.filter(game => game.category === category);
            
            filteredGames.forEach(game => {
                const gameCard = document.createElement('a');
                gameCard.className = 'game-card';
                gameCard.href = `game-${String(game.id).padStart(3, '0')}/index.html`;
                
                const categoryNames = {
                    'puzzle': '益智解谜',
                    'card': '纸牌棋盘',
                    'action': '动作射击'
                };
                
                gameCard.innerHTML = `
                    <div class="game-icon">${game.icon}</div>
                    <div class="game-number">游戏 #${game.id}</div>
                    <div class="game-title">${game.title}</div>
                    <div class="game-category">${categoryNames[game.category]}</div>
                    <div class="game-desc">${game.desc}</div>
                `;
                
                gamesGrid.appendChild(gameCard);
            });
        }

        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGames(btn.dataset.category);
            });
        });

        // 初始渲染
        renderGames();
