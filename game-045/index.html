<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骰子游戏</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>骰子游戏</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>掷骰子比大小</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        let dice = [0, 0];
        
        const diceDiv = document.createElement('div');
        diceDiv.style.cssText = 'display:flex;gap:30px;justify-content:center;margin:20px;';
        
        function render() {
            diceDiv.innerHTML = '';
            dice.forEach((d,i) => {
                const die = document.createElement('div');
                die.style.cssText = 'width:80px;height:80px;background:white;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:40px;color:#333;';
                die.textContent = d || '?';
                diceDiv.appendChild(die);
            });
        }
        
        const btn = document.createElement('button');
        btn.textContent = '掷骰子';
        btn.onclick = () => {
            dice = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];
            render();
            if(dice[0]>dice[1]) { messageDisplay.textContent = '左边大!'; addScore(10); }
            else if(dice[0]<dice[1]) { messageDisplay.textContent = '右边大!'; addScore(10); }
            else { messageDisplay.textContent = '平局!'; }
        };
        
        render();
        document.querySelector('.game-area').appendChild(diceDiv);
        document.querySelector('.game-area').appendChild(btn);
    
    </script>
</body>
</html>
