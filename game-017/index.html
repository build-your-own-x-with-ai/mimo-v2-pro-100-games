<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图形匹配</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:500px; width:90%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
        input { border-radius:5px; border:1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>图形匹配</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>找到匹配的图形</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const shapes = ['●','■','▲','◆','★'];
        let target = shapes[Math.floor(Math.random()*shapes.length)];
        let grid = [];
        
        for(let i=0;i<9;i++) {
            grid.push(shapes[Math.floor(Math.random()*shapes.length)]);
        }
        if(!grid.includes(target)) grid[Math.floor(Math.random()*9)] = target;
        
        const display = document.createElement('div');
        display.style.cssText = 'font-size:24px;margin:15px;';
        display.textContent = '找到: ' + target;
        
        const board = document.createElement('div');
        board.style.cssText = 'display:grid;grid-template-columns:repeat(3,60px);gap:5px;margin:15px auto;width:fit-content;';
        
        function render() {
            board.innerHTML = '';
            grid.forEach((s,i) => {
                const cell = document.createElement('div');
                cell.style.cssText = 'width:60px;height:60px;background:#3498db;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;border-radius:5px;';
                cell.textContent = s;
                cell.onclick = () => {
                    if(s === target) {
                        addScore(10);
                        messageDisplay.textContent = '正确!';
                        target = shapes[Math.floor(Math.random()*shapes.length)];
                        display.textContent = '找到: ' + target;
                        grid = [];
                        for(let j=0;j<9;j++) grid.push(shapes[Math.floor(Math.random()*shapes.length)]);
                        if(!grid.includes(target)) grid[Math.floor(Math.random()*9)] = target;
                        render();
                    } else {
                        messageDisplay.textContent = '错误!';
                    }
                };
                board.appendChild(cell);
            });
        }
        
        render();
        document.querySelector('.game-area').appendChild(display);
        document.querySelector('.game-area').appendChild(board);
    
    </script>
</body>
</html>
