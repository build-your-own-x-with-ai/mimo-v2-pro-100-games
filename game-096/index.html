<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陨石大战</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:300px; background:rgba(0,0,0,0.3); border-radius:10px; padding:15px; margin:15px 0; }
        canvas { display:block; margin:0 auto; background:#1a0a2e; border-radius:5px; }
        button { padding:10px 25px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; }
        .score { font-size:0.9rem; margin-bottom:10px; }
        .controls { margin-top:10px; }
        .ctrl-btn { width:50px; height:50px; font-size:1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>陨石大战</h1>
        <div class="score">时间: <span id="score">0</span>秒 | 最高分: <span id="best">0</span>秒</div>
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="300"></canvas>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="leftBtn">←</button>
            <button class="ctrl-btn" id="upBtn">↑</button>
            <button class="ctrl-btn" id="downBtn">↓</button>
            <button class="ctrl-btn" id="rightBtn">→</button>
        </div>
        <button id="startBtn">开始游戏</button>
        <div class="message" id="message">躲避陨石生存尽可能长的时间</div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        
        let score = 0;
        let bestScore = localStorage.getItem('meteorBest') || 0;
        let gameRunning = false;
        let animationId = null;
        let timerInterval = null;
        
        const W = 400, H = 300;
        canvas.width = W;
        canvas.height = H;
        
        let player = { x: W / 2, y: H / 2, size: 15, speed: 5 };
        let meteors = [];
        let particles = [];
        let stars = [];
        let difficulty = 1;
        
        bestDisplay.textContent = bestScore;
        
        function createStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }
        
        function createMeteor() {
            const side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            
            switch(side) {
                case 0: // 从上方
                    x = Math.random() * W;
                    y = -30;
                    vx = (Math.random() - 0.5) * 2;
                    vy = Math.random() * 2 + 1;
                    break;
                case 1: // 从下方
                    x = Math.random() * W;
                    y = H + 30;
                    vx = (Math.random() - 0.5) * 2;
                    vy = -(Math.random() * 2 + 1);
                    break;
                case 2: // 从左边
                    x = -30;
                    y = Math.random() * H;
                    vx = Math.random() * 2 + 1;
                    vy = (Math.random() - 0.5) * 2;
                    break;
                case 3: // 从右边
                    x = W + 30;
                    y = Math.random() * H;
                    vx = -(Math.random() * 2 + 1);
                    vy = (Math.random() - 0.5) * 2;
                    break;
            }
            
            meteors.push({
                x: x,
                y: y,
                vx: vx * difficulty,
                vy: vy * difficulty,
                size: 15 + Math.random() * 20,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.1
            });
        }
        
        function createExplosion(x, y) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 4 + 2,
                    life: 1
                });
            }
        }
        
        function drawStars() {
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.globalAlpha = 0.5 + Math.random() * 0.5;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 飞船主体
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(0, 0, player.size, 0, Math.PI * 2);
            ctx.fill();
            
            // 飞船核心
            ctx.fillStyle = '#85c1e9';
            ctx.beginPath();
            ctx.arc(0, 0, player.size * 0.6, 0, Math.PI * 2);
            ctx.fill();
            
            // 护盾效果
            ctx.strokeStyle = 'rgba(52, 152, 219, 0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, player.size + 5, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawMeteors() {
            meteors.forEach(m => {
                ctx.save();
                ctx.translate(m.x, m.y);
                ctx.rotate(m.rotation);
                
                // 陨石主体
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.arc(0, 0, m.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 陨石纹理
                ctx.fillStyle = '#654321';
                ctx.beginPath();
                ctx.arc(-m.size * 0.3, -m.size * 0.2, m.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(m.size * 0.2, m.size * 0.3, m.size * 0.25, 0, Math.PI * 2);
                ctx.fill();
                
                // 陨石边缘
                ctx.strokeStyle = '#a0522d';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, m.size, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
            });
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, ${100 + p.life * 155}, 0, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function draw() {
            ctx.fillStyle = '#1a0a2e';
            ctx.fillRect(0, 0, W, H);
            
            drawStars();
            drawMeteors();
            drawParticles();
            drawPlayer();
            
            // 显示时间
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.fillText('时间: ' + score + '秒', 10, 25);
        }
        
        function update() {
            // 更新星星
            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > H) {
                    s.y = 0;
                    s.x = Math.random() * W;
                }
            });
            
            // 更新陨石
            meteors.forEach(m => {
                m.x += m.vx;
                m.y += m.vy;
                m.rotation += m.rotationSpeed;
            });
            
            // 移除超出屏幕的陨石
            meteors = meteors.filter(m => 
                m.x > -50 && m.x < W + 50 && 
                m.y > -50 && m.y < H + 50
            );
            
            // 更新粒子
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
            
            // 碰撞检测
            for (let m of meteors) {
                const dx = player.x - m.x;
                const dy = player.y - m.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.size + m.size * 0.8) {
                    createExplosion(player.x, player.y);
                    gameOver();
                    return;
                }
            }
            
            // 增加难度
            difficulty = 1 + score * 0.01;
            
            // 随机生成陨石
            if (Math.random() < 0.02 + score * 0.001) {
                createMeteor();
            }
        }
        
        function initGame() {
            player.x = W / 2;
            player.y = H / 2;
            meteors = [];
            particles = [];
            score = 0;
            difficulty = 1;
            scoreDisplay.textContent = score;
            
            createStars();
            
            if (animationId) cancelAnimationFrame(animationId);
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (gameRunning) {
                    score++;
                    scoreDisplay.textContent = score;
                }
            }, 1000);
            
            gameLoop();
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            clearInterval(timerInterval);
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('meteorBest', bestScore);
                bestDisplay.textContent = bestScore;
                messageDisplay.textContent = '新纪录! 你生存了 ' + score + ' 秒!';
            } else {
                messageDisplay.textContent = '游戏结束! 你生存了 ' + score + ' 秒!';
            }
            
            startBtn.textContent = '重新开始';
        }
        
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') player.x = Math.max(player.size, player.x - player.speed);
            if (e.key === 'ArrowRight') player.x = Math.min(W - player.size, player.x + player.speed);
            if (e.key === 'ArrowUp') player.y = Math.max(player.size, player.y - player.speed);
            if (e.key === 'ArrowDown') player.y = Math.min(H - player.size, player.y + player.speed);
        });
        
        document.getElementById('leftBtn').addEventListener('click', () => {
            if (gameRunning) player.x = Math.max(player.size, player.x - player.speed);
        });
        document.getElementById('rightBtn').addEventListener('click', () => {
            if (gameRunning) player.x = Math.min(W - player.size, player.x + player.speed);
        });
        document.getElementById('upBtn').addEventListener('click', () => {
            if (gameRunning) player.y = Math.max(player.size, player.y - player.speed);
        });
        document.getElementById('downBtn').addEventListener('click', () => {
            if (gameRunning) player.y = Math.min(H - player.size, player.y + player.speed);
        });
        
        startBtn.addEventListener('click', () => {
            gameRunning = true;
            messageDisplay.textContent = '游戏进行中...';
            startBtn.textContent = '重新开始';
            initGame();
        });
    </script>
</body>
</html>
