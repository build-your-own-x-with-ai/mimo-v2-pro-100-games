<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>陨石大战</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>陨石大战</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">躲避陨石</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g96Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g96Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let player = {x:W/2, y:H/2, size:15};
        let meteors = [];
        let particles = [];
        
        function draw() {
            ctx.fillStyle='#1a0a2e';
            ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle='#3498db';
            ctx.beginPath();ctx.arc(player.x,player.y,player.size,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#85c1e9';
            ctx.beginPath();ctx.arc(player.x,player.y,player.size*0.6,0,Math.PI*2);ctx.fill();
            
            ctx.fillStyle='#8b4513';
            meteors.forEach(m=>{ctx.beginPath();ctx.arc(m.x,m.y,m.size,0,Math.PI*2);ctx.fill();});
            
            ctx.fillStyle='rgba(255,200,0,0.8)';
            particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fill();});
            
            ctx.fillStyle='#fff';ctx.font='16px Arial';
            ctx.fillText('生存: '+score+'秒',10,25);
        }
        
        function update() {
            if(Math.random()<0.05+score*0.001){
                const s=Math.floor(Math.random()*4);
                let x,y;
                if(s===0){x=Math.random()*W;y=-30;}
                else if(s===1){x=W+30;y=Math.random()*H;}
                else if(s===2){x=Math.random()*W;y=H+30;}
                else{x=-30;y=Math.random()*H;}
                meteors.push({x,y,vx:(player.x-x)/100+(Math.random()-0.5),vy:(player.y-y)/100+(Math.random()-0.5),size:15+Math.random()*15});
            }
            
            meteors.forEach(m=>{
                m.x+=m.vx;m.y+=m.vy;
                if(Math.hypot(player.x-m.x,player.y-m.y)<player.size+m.size*0.8){
                    particles.push({x:player.x,y:player.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,s:5});
                    gameOver();
                }
            });
            
            meteors=meteors.filter(m=>m.x>-50&&m.x<W+50&&m.y>-50&&m.y<H+50);
            particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.s-=0.2;});
            particles=particles.filter(p=>p.s>0);
        }
        
        function initGame(){player={x:W/2,y:H/2,size:15};meteors=[];particles=[];if(animationId)cancelAnimationFrame(animationId);if(window.timer)clearInterval(window.timer);window.timer=setInterval(()=>{if(gameRunning){score++;scoreDisplay.textContent=score;}},1000);gameLoop();}
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft')player.x=Math.max(15,player.x-8);
            if(e.key==='ArrowRight')player.x=Math.min(W-15,player.x+8);
            if(e.key==='ArrowUp')player.y=Math.max(15,player.y-8);
            if(e.key==='ArrowDown')player.y=Math.min(H-15,player.y+8);
        });
        document.getElementById('leftBtn').onclick=()=>player.x=Math.max(15,player.x-8);
        document.getElementById('rightBtn').onclick=()=>player.x=Math.min(W-15,player.x+8);
        document.getElementById('upBtn').onclick=()=>player.y=Math.max(15,player.y-8);
        document.getElementById('downBtn').onclick=()=>player.y=Math.min(H-15,player.y+8);
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
