<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>冒险岛</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>冒险岛</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">跳跃收集水果</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g81Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g81Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let player = {x:50, y:H-60, vy:0, dir:1};
        let fruits = [];
        let platforms = [{x:0,y:H-30,w:400},{x:80,y:H-80,w:80},{x:200,y:H-130,w:80},{x:320,y:H-80,w:80},{x:150,y:H-180,w:100}];
        let gravity = 0.5;
        
        for(let i=0;i<8;i++) fruits.push({x:Math.random()*350+20, y:Math.random()*180+20, type:['🍎','🍌','🍇','🍊'][i%4], collected:false});
        
        function draw() {
            ctx.fillStyle='#87CEEB';
            ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle='#8B4513';
            platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,15));
            
            fruits.forEach(f=>{
                if(!f.collected){ctx.font='20px Arial';ctx.fillText(f.type,f.x,f.y);}
            });
            
            ctx.fillStyle='#f39c12';
            ctx.fillRect(player.x-10,player.y-20,20,20);
            ctx.fillStyle='#fff';
            ctx.font='12px Arial';
            ctx.fillText(player.dir>0?'😊':'😊',player.x-6,player.y-5);
        }
        
        function update() {
            player.vy+=gravity;
            player.y+=player.vy;
            
            platforms.forEach(p=>{
                if(player.x>p.x&&player.x<p.x+p.w&&player.y>=p.y&&player.y<=p.y+15&&player.vy>0){
                    player.y=p.y;player.vy=0;
                }
            });
            
            fruits.forEach(f=>{
                if(!f.collected&&Math.abs(player.x-f.x)<15&&Math.abs(player.y-10-f.y)<15){
                    f.collected=true;addScore(10);
                }
            });
            
            if(player.y>H)gameOver();
            if(fruits.every(f=>f.collected)){messageDisplay.textContent='收集完成!';gameOver();}
        }
        
        function initGame(){
            player={x:50,y:H-60,vy:0,dir:1};
            fruits=[];
            for(let i=0;i<8;i++)fruits.push({x:Math.random()*350+20,y:Math.random()*180+20,type:['🍎','🍌','🍇','🍊'][i%4],collected:false});
            if(animationId)cancelAnimationFrame(animationId);gameLoop();
        }
        
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        function jump(){if(player.vy===0)player.vy=-10;}
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft'){player.x=Math.max(10,player.x-5);player.dir=-1;}
            if(e.key==='ArrowRight'){player.x=Math.min(W-10,player.x+5);player.dir=1;}
            if(e.key===' ')jump();
        });
        document.getElementById('leftBtn').onclick=()=>{player.x=Math.max(10,player.x-5);player.dir=-1;};
        document.getElementById('rightBtn').onclick=()=>{player.x=Math.min(W-10,player.x+5);player.dir=1;};
        document.getElementById('upBtn').onclick=jump;
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
