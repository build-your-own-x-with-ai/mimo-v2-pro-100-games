<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .score-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }
        .game-board {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 30px;
            position: relative;
        }
        .snake {
            position: absolute;
            background: #2ecc71;
            border-radius: 4px;
            transition: all 0.1s ease;
        }
        .snake.head {
            background: #27ae60;
            border-radius: 6px;
        }
        .food {
            position: absolute;
            background: #e74c3c;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-btn {
            padding: 15px;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        .control-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        .control-btn.up { grid-column: 2; }
        .control-btn.left { grid-row: 2; }
        .control-btn.right { grid-row: 2; grid-column: 3; }
        .control-btn.down { grid-row: 3; grid-column: 2; }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .message {
            font-size: 1.3rem;
            margin-top: 20px;
            min-height: 30px;
        }
        .instructions {
            font-size: 0.9rem;
            margin-top: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>贪吃蛇</h1>
        <div class="score-container">
            <div>分数: <span id="score">0</span></div>
            <div>最高分: <span id="bestScore">0</span></div>
        </div>
        <div class="game-board" id="gameBoard" style="width: 400px; height: 400px;"></div>
        <div class="controls">
            <button class="control-btn up" id="upBtn">↑</button>
            <button class="control-btn left" id="leftBtn">←</button>
            <button class="control-btn right" id="rightBtn">→</button>
            <button class="control-btn down" id="downBtn">↓</button>
        </div>
        <button id="startBtn">开始游戏</button>
        <div class="message" id="message"></div>
        <div class="instructions">使用方向键或按钮控制蛇的移动</div>
    </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const bestScoreDisplay = document.getElementById('bestScore');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        
        const gridSize = 20;
        const cellSize = 20;
        let snake = [];
        let food = null;
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let bestScore = localStorage.getItem('snakeBest') || 0;
        let gameLoop = null;
        let gameRunning = false;
        
        bestScoreDisplay.textContent = bestScore;
        
        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreDisplay.textContent = score;
            messageDisplay.textContent = '';
            
            spawnFood();
            render();
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(move, 150);
            gameRunning = true;
            startBtn.textContent = '重新开始';
        }
        
        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * gridSize),
                    y: Math.floor(Math.random() * gridSize)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            food = newFood;
        }
        
        function move() {
            direction = nextDirection;
            
            const head = { ...snake[0] };
            
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 检查碰撞
            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                gameOver();
                return;
            }
            
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;
                
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('snakeBest', bestScore);
                    bestScoreDisplay.textContent = bestScore;
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
            
            render();
        }
        
        function render() {
            gameBoard.innerHTML = '';
            
            // 渲染蛇
            snake.forEach((segment, index) => {
                const snakeElement = document.createElement('div');
                snakeElement.className = 'snake';
                if (index === 0) snakeElement.classList.add('head');
                snakeElement.style.left = segment.x * cellSize + 'px';
                snakeElement.style.top = segment.y * cellSize + 'px';
                snakeElement.style.width = cellSize - 2 + 'px';
                snakeElement.style.height = cellSize - 2 + 'px';
                gameBoard.appendChild(snakeElement);
            });
            
            // 渲染食物
            const foodElement = document.createElement('div');
            foodElement.className = 'food';
            foodElement.style.left = food.x * cellSize + 'px';
            foodElement.style.top = food.y * cellSize + 'px';
            foodElement.style.width = cellSize - 2 + 'px';
            foodElement.style.height = cellSize - 2 + 'px';
            gameBoard.appendChild(foodElement);
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            gameRunning = false;
            messageDisplay.textContent = `游戏结束! 得分: ${score}`;
            startBtn.textContent = '开始游戏';
        }
        
        function changeDirection(newDirection) {
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            if (newDirection !== opposites[direction]) {
                nextDirection = newDirection;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch (e.key) {
                case 'ArrowUp': changeDirection('up'); break;
                case 'ArrowDown': changeDirection('down'); break;
                case 'ArrowLeft': changeDirection('left'); break;
                case 'ArrowRight': changeDirection('right'); break;
            }
        });
        
        upBtn.addEventListener('click', () => changeDirection('up'));
        downBtn.addEventListener('click', () => changeDirection('down'));
        leftBtn.addEventListener('click', () => changeDirection('left'));
        rightBtn.addEventListener('click', () => changeDirection('right'));
        
        startBtn.addEventListener('click', initGame);
        
        // 初始化
        gameBoard.style.position = 'relative';
        gameBoard.style.overflow = 'hidden';
    </script>
</body>
</html>
