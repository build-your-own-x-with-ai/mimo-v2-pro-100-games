<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空间旋转</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:500px; width:90%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
        input { border-radius:5px; border:1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>空间旋转</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>旋转图形匹配</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        let rotation = 0;
        let target = [0,90,180,270][Math.floor(Math.random()*4)];
        
        const targetDiv = document.createElement('div');
        targetDiv.style.cssText = 'width:80px;height:80px;background:#e74c3c;margin:10px auto;transform:rotate('+target+'deg);';
        
        const currentDiv = document.createElement('div');
        currentDiv.style.cssText = 'width:80px;height:80px;background:#3498db;margin:10px auto;transition:transform 0.3s;';
        
        const btns = document.createElement('div');
        btns.style.cssText = 'display:flex;gap:10px;justify-content:center;margin:15px;';
        
        [-90,90].forEach(r => {
            const btn = document.createElement('button');
            btn.textContent = r > 0 ? '→90°' : '←90°';
            btn.onclick = () => {
                rotation = (rotation + r + 360) % 360;
                currentDiv.style.transform = 'rotate(' + rotation + 'deg)';
            };
            btns.appendChild(btn);
        });
        
        const checkBtn = document.createElement('button');
        checkBtn.textContent = '检查';
        checkBtn.onclick = () => {
            if(rotation === target) {
                messageDisplay.textContent = '正确!';
                addScore(10);
                target = [0,90,180,270][Math.floor(Math.random()*4)];
                targetDiv.style.transform = 'rotate(' + target + 'deg)';
                rotation = 0;
                currentDiv.style.transform = 'rotate(0deg)';
            } else {
                messageDisplay.textContent = '不匹配!';
            }
        };
        btns.appendChild(checkBtn);
        
        document.querySelector('.game-area').appendChild(document.createElement('p')).textContent = '目标:';
        document.querySelector('.game-area').appendChild(targetDiv);
        document.querySelector('.game-area').appendChild(document.createElement('p')).textContent = '当前:';
        document.querySelector('.game-area').appendChild(currentDiv);
        document.querySelector('.game-area').appendChild(btns);
    
    </script>
</body>
</html>
