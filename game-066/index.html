<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棒球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>棒球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>击球</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const field = document.createElement('div');
        field.style.cssText = 'width:400px;height:300px;background:#27ae60;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const pitcher = document.createElement('div');
        pitcher.style.cssText = 'position:absolute;left:180px;top:50px;font-size:30px;';
        pitcher.textContent = '🥎';
        field.appendChild(pitcher);
        
        const batter = document.createElement('div');
        batter.style.cssText = 'position:absolute;left:100px;top:200px;font-size:30px;';
        batter.textContent = '⚾';
        field.appendChild(batter);
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;width:15px;height:15px;background:white;border-radius:50%;left:185px;top:80px;';
        field.appendChild(ball);
        
        let ballX = 185, ballY = 80, ballVX = 0, ballVY = 0;
        let isPitching = false, isHit = false;
        let pitches = 0, hits = 0;
        let pitchSpeed = 5;
        
        function resetBall() {
            ballX = 185; ballY = 80; ballVX = 0; ballVY = 0;
            isPitching = false; isHit = false;
        }
        
        function pitch() {
            if(!isPitching && !isHit) {
                isPitching = true;
                pitches++;
                ballVY = pitchSpeed;
                ballVX = (Math.random() - 0.5) * 2;
            }
        }
        
        field.onclick = () => {
            if(isPitching && !isHit) {
                isHit = true;
                hits++;
                const hitPower = Math.random() * 10 + 5;
                ballVY = -hitPower;
                ballVX = (Math.random() - 0.5) * 8;
                addScore(10);
                messageDisplay.textContent = '安打! ' + hits + '/' + pitches;
            } else if(!isPitching) {
                pitch();
            }
        };
        
        function update() {
            if(isPitching || isHit) {
                ballX += ballVX;
                ballY += ballVY;
                
                if(isHit) {
                    ballVY += 0.2;
                }
                
                if(ballY > 280 || ballX < 0 || ballX > 380) {
                    if(isHit) {
                        messageDisplay.textContent = '击球成功! 距离: ' + Math.floor(280 - ballY) + '米';
                    } else {
                        messageDisplay.textContent = '出局! ' + hits + '/' + pitches;
                    }
                    setTimeout(resetBall, 1000);
                    ballVX = 0; ballVY = 0;
                }
            }
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }
        
        setInterval(update, 20);
        document.querySelector('.game-area').appendChild(field);
    
    </script>
</body>
</html>
