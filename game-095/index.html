<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>小行星</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>小行星</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">射击小行星</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g95Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g95Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let ship = {x:W/2, y:H/2, angle:0, vx:0, vy:0};
        let bullets = [];
        let asteroids = [];
        
        for(let i=0;i<5;i++) asteroids.push({x:Math.random()*W,y:Math.random()*H,size:25,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2});
        
        function draw() {
            ctx.fillStyle='#000';
            ctx.fillRect(0,0,W,H);
            
            ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
            ctx.strokeStyle='#fff';ctx.lineWidth=2;
            ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(-10,-8);ctx.lineTo(-5,0);ctx.lineTo(-10,8);ctx.closePath();ctx.stroke();
            ctx.restore();
            
            ctx.fillStyle='#ff0';
            bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();});
            
            ctx.strokeStyle='#888';ctx.lineWidth=2;
            asteroids.forEach(a=>{ctx.beginPath();ctx.arc(a.x,a.y,a.size,0,Math.PI*2);ctx.stroke();});
        }
        
        function update() {
            ship.x+=ship.vx;ship.y+=ship.vy;
            ship.vx*=0.99;ship.vy*=0.99;
            if(ship.x<0)ship.x=W;if(ship.x>W)ship.x=0;
            if(ship.y<0)ship.y=H;if(ship.y>H)ship.y=0;
            
            bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
            bullets=bullets.filter(b=>b.x>0&&b.x<W&&b.y>0&&b.y<H);
            
            asteroids.forEach(a=>{
                a.x+=a.vx;a.y+=a.vy;
                if(a.x<0)a.x=W;if(a.x>W)a.x=0;
                if(a.y<0)a.y=H;if(a.y>H)a.y=0;
                
                bullets.forEach(b=>{
                    if(Math.hypot(b.x-a.x,b.y-a.y)<a.size){
                        b.x=-100;a.size-=10;addScore(20);
                        if(a.size<10)a.x=-100;
                        else{asteroids.push({x:a.x,y:a.y,size:a.size,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3});}
                    }
                });
                
                if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.size+10)gameOver();
            });
            
            asteroids=asteroids.filter(a=>a.x>-50&&a.size>=10);
            if(asteroids.length===0){for(let i=0;i<6;i++)asteroids.push({x:Math.random()*W,y:Math.random()*H,size:25,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2});}
        }
        
        function initGame(){ship={x:W/2,y:H/2,angle:0,vx:0,vy:0};bullets=[];asteroids=[];for(let i=0;i<5;i++)asteroids.push({x:Math.random()*W,y:Math.random()*H,size:25,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2});if(animationId)cancelAnimationFrame(animationId);gameLoop();}
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        function fire(){if(gameRunning)bullets.push({x:ship.x+Math.cos(ship.angle)*15,y:ship.y+Math.sin(ship.angle)*15,vx:Math.cos(ship.angle)*8,vy:Math.sin(ship.angle)*8});}
        function thrust(){ship.vx+=Math.cos(ship.angle)*0.3;ship.vy+=Math.sin(ship.angle)*0.3;}
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft')ship.angle-=0.15;
            if(e.key==='ArrowRight')ship.angle+=0.15;
            if(e.key==='ArrowUp')thrust();
            if(e.key===' ')fire();
        });
        document.getElementById('leftBtn').onclick=()=>ship.angle-=0.15;
        document.getElementById('rightBtn').onclick=()=>ship.angle+=0.15;
        document.getElementById('upBtn').onclick=thrust;
        document.getElementById('fireBtn').onclick=fire;
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
