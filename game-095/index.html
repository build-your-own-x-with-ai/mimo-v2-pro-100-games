<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小行星</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:300px; background:rgba(0,0,0,0.3); border-radius:10px; padding:15px; margin:15px 0; }
        canvas { display:block; margin:0 auto; background:#000; border-radius:5px; }
        button { padding:10px 25px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; }
        .score { font-size:0.9rem; margin-bottom:10px; }
        .controls { margin-top:10px; }
        .ctrl-btn { width:50px; height:50px; font-size:1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>小行星</h1>
        <div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div>
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="300"></canvas>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="leftBtn">左转</button>
            <button class="ctrl-btn" id="thrustBtn">推进</button>
            <button class="ctrl-btn" id="rightBtn">右转</button>
            <button class="ctrl-btn" id="fireBtn">射击</button>
        </div>
        <button id="startBtn">开始游戏</button>
        <div class="message" id="message">经典小行星射击游戏</div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        
        let score = 0;
        let bestScore = localStorage.getItem('asteroidsBest') || 0;
        let gameRunning = false;
        let animationId = null;
        
        const W = 400, H = 300;
        canvas.width = W;
        canvas.height = H;
        
        let ship = { x: W / 2, y: H / 2, angle: 0, vx: 0, vy: 0, size: 15 };
        let bullets = [];
        let asteroids = [];
        let lives = 3;
        let level = 1;
        
        bestDisplay.textContent = bestScore;
        
        function addScore(n) {
            score += n;
            scoreDisplay.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('asteroidsBest', bestScore);
                bestDisplay.textContent = bestScore;
            }
        }
        
        function createAsteroids() {
            asteroids = [];
            for (let i = 0; i < level + 4; i++) {
                let x, y;
                do {
                    x = Math.random() * W;
                    y = Math.random() * H;
                } while (Math.hypot(x - ship.x, y - ship.y) < 100);
                
                asteroids.push({
                    x: x,
                    y: y,
                    size: 20 + Math.random() * 20,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2
                });
            }
        }
        
        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(ship.size, 0);
            ctx.lineTo(-ship.size * 0.7, -ship.size * 0.5);
            ctx.lineTo(-ship.size * 0.4, 0);
            ctx.lineTo(-ship.size * 0.7, ship.size * 0.5);
            ctx.closePath();
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawAsteroids() {
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 2;
            
            asteroids.forEach(a => {
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.size, 0, Math.PI * 2);
                ctx.stroke();
                
                // 陨石纹理
                ctx.beginPath();
                ctx.arc(a.x - a.size * 0.3, a.y - a.size * 0.2, a.size * 0.2, 0, Math.PI * 2);
                ctx.arc(a.x + a.size * 0.2, a.y + a.size * 0.3, a.size * 0.15, 0, Math.PI * 2);
                ctx.stroke();
            });
        }
        
        function drawBullets() {
            ctx.fillStyle = '#ff0';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawLives() {
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.fillText('生命: ' + lives, 10, 25);
            ctx.fillText('等级: ' + level, 10, 45);
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);
            
            drawShip();
            drawAsteroids();
            drawBullets();
            drawLives();
        }
        
        function update() {
            // 更新飞船
            ship.x += ship.vx;
            ship.y += ship.vy;
            ship.vx *= 0.99;
            ship.vy *= 0.99;
            
            // 边界环绕
            if (ship.x < 0) ship.x = W;
            if (ship.x > W) ship.x = 0;
            if (ship.y < 0) ship.y = H;
            if (ship.y > H) ship.y = 0;
            
            // 更新子弹
            bullets.forEach(b => {
                b.x += b.vx;
                b.y += b.vy;
            });
            bullets = bullets.filter(b => b.x > 0 && b.x < W && b.y > 0 && b.y < H);
            
            // 更新陨石
            asteroids.forEach(a => {
                a.x += a.vx;
                a.y += a.vy;
                if (a.x < -a.size) a.x = W + a.size;
                if (a.x > W + a.size) a.x = -a.size;
                if (a.y < -a.size) a.y = H + a.size;
                if (a.y > H + a.size) a.y = -a.size;
            });
            
            // 子弹击中陨石
            bullets.forEach(b => {
                asteroids.forEach(a => {
                    if (Math.hypot(b.x - a.x, b.y - a.y) < a.size) {
                        b.x = -100;
                        a.x = -100;
                        addScore(Math.floor(50 / a.size * 10));
                        
                        // 分裂大陨石
                        if (a.size > 15) {
                            for (let i = 0; i < 2; i++) {
                                asteroids.push({
                                    x: a.x,
                                    y: a.y,
                                    size: a.size * 0.6,
                                    vx: (Math.random() - 0.5) * 3,
                                    vy: (Math.random() - 0.5) * 3
                                });
                            }
                        }
                    }
                });
            });
            
            // 清理被击中的陨石
            asteroids = asteroids.filter(a => a.x > -50);
            
            // 飞船撞击陨石
            asteroids.forEach(a => {
                if (Math.hypot(ship.x - a.x, ship.y - a.y) < ship.size + a.size) {
                    lives--;
                    if (lives <= 0) {
                        gameOver();
                    } else {
                        ship.x = W / 2;
                        ship.y = H / 2;
                        ship.vx = 0;
                        ship.vy = 0;
                    }
                }
            });
            
            // 检查是否过关
            if (asteroids.length === 0) {
                level++;
                createAsteroids();
                messageDisplay.textContent = '第 ' + level + ' 级!';
            }
        }
        
        function initGame() {
            ship.x = W / 2;
            ship.y = H / 2;
            ship.vx = 0;
            ship.vy = 0;
            ship.angle = 0;
            bullets = [];
            lives = 3;
            level = 1;
            createAsteroids();
            
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function fire() {
            if (gameRunning) {
                bullets.push({
                    x: ship.x + Math.cos(ship.angle) * ship.size,
                    y: ship.y + Math.sin(ship.angle) * ship.size,
                    vx: Math.cos(ship.angle) * 8,
                    vy: Math.sin(ship.angle) * 8
                });
            }
        }
        
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            messageDisplay.textContent = '游戏结束! 得分: ' + score + ' 等级: ' + level;
            startBtn.textContent = '重新开始';
        }
        
        function rotateLeft() {
            if (gameRunning) ship.angle -= 0.1;
        }
        
        function rotateRight() {
            if (gameRunning) ship.angle += 0.1;
        }
        
        function thrust() {
            if (gameRunning) {
                ship.vx += Math.cos(ship.angle) * 0.5;
                ship.vy += Math.sin(ship.angle) * 0.5;
            }
        }
        
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') rotateLeft();
            if (e.key === 'ArrowRight') rotateRight();
            if (e.key === 'ArrowUp') thrust();
            if (e.key === ' ') fire();
        });
        
        document.getElementById('leftBtn').addEventListener('click', rotateLeft);
        document.getElementById('rightBtn').addEventListener('click', rotateRight);
        document.getElementById('thrustBtn').addEventListener('click', thrust);
        document.getElementById('fireBtn').addEventListener('click', fire);
        
        startBtn.addEventListener('click', () => {
            score = 0;
            scoreDisplay.textContent = score;
            gameRunning = true;
            messageDisplay.textContent = '游戏进行中...';
            startBtn.textContent = '重新开始';
            initGame();
        });
    </script>
</body>
</html>
