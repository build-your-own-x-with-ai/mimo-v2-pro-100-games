<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>雷电</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>雷电</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">竖版射击经典</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g89Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g89Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let player = {x:W/2, y:H-50, hp:3, weapon:1};
        let bullets = [];
        let enemies = [];
        let powerups = [];
        let stars = Array(30).fill().map(()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+1}));
        
        function draw() {
            ctx.fillStyle='#0a0a2e';
            ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle='#fff';
            stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));
            
            ctx.fillStyle='#3498db';
            ctx.beginPath();
            ctx.moveTo(player.x,player.y-20);
            ctx.lineTo(player.x-15,player.y+10);
            ctx.lineTo(player.x+15,player.y+10);
            ctx.fill();
            
            ctx.fillStyle='#f1c40f';
            bullets.forEach(b => { ctx.fillRect(b.x-2,b.y-8,4,12); if(b.x2) ctx.fillRect(b.x2-2,b.y-8,4,12); });
            
            ctx.fillStyle='#e74c3c';
            enemies.forEach(e => {
                ctx.beginPath(); ctx.arc(e.x,e.y,e.size,0,Math.PI*2); ctx.fill();
            });
            
            ctx.fillStyle='#2ecc71';
            powerups.forEach(p => { ctx.fillRect(p.x-10,p.y-10,20,20); });
            
            ctx.fillStyle='#fff';
            ctx.fillText('HP: '+'❤️'.repeat(player.hp),10,20);
            ctx.fillText('Power: '+player.weapon,10,35);
        }
        
        function update() {
            stars.forEach(s=>{s.y+=s.s;if(s.y>H)s.y=0;});
            
            bullets.forEach(b=>{b.y-=10;});
            bullets=bullets.filter(b=>b.y>0);
            
            if(Math.random()<0.04) {
                const type=Math.random();
                enemies.push({x:Math.random()*W,y:-20,size:type<0.7?15:25,hp:type<0.7?1:3,speed:type<0.7?2:1});
            }
            
            enemies.forEach(e=>{
                e.y+=e.speed;
                bullets.forEach(b=>{
                    if(Math.abs(b.x-e.x)<e.size&&Math.abs(b.y-e.y)<e.size){e.hp--;b.y=-50;if(b.x2&&Math.abs(b.x2-e.x)<e.size)e.hp--;}
                    if(e.hp<=0){e.y=H+50;addScore(e.size*5);}
                });
                if(Math.abs(player.x-e.x)<e.size+10&&Math.abs(player.y-e.y)<e.size+10){e.y=H+50;player.hp--;if(player.hp<=0)gameOver();}
            });
            enemies=enemies.filter(e=>e.y<H+50);
            
            powerups.forEach(p=>{
                p.y+=2;
                if(Math.abs(player.x-p.x)<20&&Math.abs(player.y-p.y)<20){p.y=H+50;player.weapon=Math.min(3,player.weapon+1);}
            });
            powerups=powerups.filter(p=>p.y<H);
            
            if(Math.random()<0.003)powerups.push({x:Math.random()*W,y:-20});
        }
        
        function initGame(){player={x:W/2,y:H-50,hp:3,weapon:1};bullets=[];enemies=[];powerups=[];if(animationId)cancelAnimationFrame(animationId);gameLoop();}
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        function fire(){if(!gameRunning)return;bullets.push({x:player.x,y:player.y-20,x2:player.weapon>=2?player.x-20:null});}
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft')player.x=Math.max(15,player.x-10);
            if(e.key==='ArrowRight')player.x=Math.min(W-15,player.x+10);
            if(e.key==='ArrowUp')player.y=Math.max(30,player.y-10);
            if(e.key==='ArrowDown')player.y=Math.min(H-20,player.y+10);
            if(e.key===' ')fire();
        });
        document.getElementById('leftBtn').onclick=()=>player.x=Math.max(15,player.x-10);
        document.getElementById('rightBtn').onclick=()=>player.x=Math.min(W-15,player.x+10);
        document.getElementById('upBtn').onclick=()=>player.y=Math.max(30,player.y-10);
        document.getElementById('downBtn').onclick=()=>player.y=Math.min(H-20,player.y+10);
        document.getElementById('fireBtn').onclick=fire;
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
