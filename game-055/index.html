<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>射箭游戏</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>射箭游戏</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>瞄准靶心射箭</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const field = document.createElement('div');
        field.style.cssText = 'width:400px;height:300px;background:#87ceeb;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const target = document.createElement('div');
        target.style.cssText = 'position:absolute;right:50px;top:50px;width:120px;height:120px;border-radius:50%;background:conic-gradient(#e74c3c 0deg 60deg,#fff 60deg 120deg,#e74c3c 120deg 180deg,#fff 180deg 240deg,#e74c3c 240deg 300deg,#fff 300deg 360deg);border:10px solid #8b4513;';
        field.appendChild(target);
        
        const bow = document.createElement('div');
        bow.style.cssText = 'position:absolute;left:50px;top:140px;width:10px;height:60px;background:#8b4513;border-radius:5px;';
        field.appendChild(bow);
        
        const arrow = document.createElement('div');
        arrow.style.cssText = 'position:absolute;left:60px;top:170px;width:30px;height:5px;background:#e74c3c;';
        field.appendChild(arrow);
        
        let arrowX = 60, arrowY = 170, arrowVX = 0, arrowVY = 0;
        let isDragging = false;
        let dragStartX, dragStartY;
        let isFlying = false;
        const gravity = 0.3;
        
        function resetArrow() {
            arrowX = 60; arrowY = 170; arrowVX = 0; arrowVY = 0;
            isFlying = false;
        }
        
        function update() {
            if(isFlying) {
                arrowX += arrowVX;
                arrowY += arrowVY;
                arrowVY += gravity;
                
                if(arrowY > 280) {
                    resetArrow();
                }
                
                if(arrowX > 280 && arrowX < 400 && arrowY > 50 && arrowY < 170) {
                    const targetX = 340, targetY = 110;
                    const dist = Math.sqrt((arrowX - targetX)**2 + (arrowY - targetY)**2);
                    if(dist < 20) {
                        addScore(50);
                        messageDisplay.textContent = '靶心! 50分';
                    } else if(dist < 50) {
                        addScore(20);
                        messageDisplay.textContent = '接近! 20分';
                    } else if(dist < 70) {
                        addScore(10);
                        messageDisplay.textContent = '10分';
                    } else {
                        messageDisplay.textContent = '脱靶!';
                    }
                    setTimeout(resetArrow, 500);
                    arrowVX = 0; arrowVY = 0;
                }
            }
            
            arrow.style.left = arrowX + 'px';
            arrow.style.top = arrowY + 'px';
        }
        
        field.addEventListener('mousedown', e => {
            if(!isFlying) {
                isDragging = true;
                const rect = field.getBoundingClientRect();
                dragStartX = e.clientX - rect.left;
                dragStartY = e.clientY - rect.top;
            }
        });
        
        field.addEventListener('mousemove', e => {
            if(isDragging) {
                const rect = field.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = dragStartX - mouseX;
                const dy = dragStartY - mouseY;
                arrowX = dragStartX + dx * 0.3;
                arrowY = dragStartY + dy * 0.3;
            }
        });
        
        field.addEventListener('mouseup', e => {
            if(isDragging) {
                isDragging = false;
                isFlying = true;
                const rect = field.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                arrowVX = (dragStartX - mouseX) * 0.2;
                arrowVY = (dragStartY - mouseY) * 0.2;
            }
        });
        
        field.addEventListener('mouseleave', () => {
            if(isDragging) {
                isDragging = false;
            }
        });
        
        setInterval(update, 20);
        document.querySelector('.game-area').appendChild(field);
    
    </script>
</body>
</html>
