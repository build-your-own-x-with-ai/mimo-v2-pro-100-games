<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>水球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>水中投球</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const pool = document.createElement('div');
        pool.style.cssText = 'width:400px;height:300px;background:#3498db;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const goal = document.createElement('div');
        goal.style.cssText = 'position:absolute;right:10px;top:100px;width:60px;height:100px;background:white;border-radius:5px;';
        pool.appendChild(goal);
        
        const goalkeeper = document.createElement('div');
        goalkeeper.style.cssText = 'position:absolute;right:20px;top:120px;width:40px;height:60px;background:#e74c3c;border-radius:5px;';
        pool.appendChild(goalkeeper);
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;width:20px;height:20px;background:#f39c12;border-radius:50%;left:50px;top:200px;';
        pool.appendChild(ball);
        
        const player = document.createElement('div');
        player.style.cssText = 'position:absolute;left:40px;top:190px;width:30px;height:40px;background:#e74c3c;border-radius:5px;';
        pool.appendChild(player);
        
        let ballX = 50, ballY = 200, ballVX = 0, ballVY = 0;
        let playerX = 40, playerY = 190;
        let isDragging = false;
        let dragStartX, dragStartY;
        let shots = 0, goals = 0;
        const waterResistance = 0.95;
        
        function resetBall() {
            ballX = 50; ballY = 200; ballVX = 0; ballVY = 0;
            playerX = 40; playerY = 190;
        }
        
        function update() {
            if(!isDragging && (ballVX !== 0 || ballVY !== 0)) {
                ballX += ballVX;
                ballY += ballVY;
                ballVX *= waterResistance;
                ballVY *= waterResistance;
                
                if(Math.abs(ballVX) < 0.1) ballVX = 0;
                if(Math.abs(ballVY) < 0.1) ballVY = 0;
                
                if(ballX > 330 && ballY > 100 && ballY < 200) {
                    const keeperX = parseInt(goalkeeper.style.right) || 20;
                    if(ballY < 120 || ballY > 180) {
                        goals++;
                        addScore(1);
                        messageDisplay.textContent = '进球! ' + goals + '/' + shots;
                    } else {
                        messageDisplay.textContent = '被扑出! ' + goals + '/' + shots;
                    }
                    setTimeout(resetBall, 1000);
                    ballVX = 0; ballVY = 0;
                }
                
                if(ballX < 0 || ballX > 380) {
                    ballVX = -ballVX * 0.8;
                }
                if(ballY < 0 || ballY > 280) {
                    ballVY = -ballVY * 0.8;
                }
            }
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
        }
        
        pool.addEventListener('mousedown', e => {
            if(ballVX === 0 && ballVY === 0) {
                isDragging = true;
                const rect = pool.getBoundingClientRect();
                dragStartX = e.clientX - rect.left;
                dragStartY = e.clientY - rect.top;
            }
        });
        
        pool.addEventListener('mousemove', e => {
            if(isDragging) {
                const rect = pool.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = dragStartX - mouseX;
                const dy = dragStartY - mouseY;
                ballX = dragStartX + dx * 0.2;
                ballY = dragStartY + dy * 0.2;
            }
        });
        
        pool.addEventListener('mouseup', e => {
            if(isDragging) {
                isDragging = false;
                shots++;
                const rect = pool.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                ballVX = (dragStartX - mouseX) * 0.1;
                ballVY = (dragStartY - mouseY) * 0.1;
            }
        });
        
        pool.addEventListener('mouseleave', () => {
            if(isDragging) {
                isDragging = false;
            }
        });
        
        setInterval(update, 20);
        document.querySelector('.game-area').appendChild(pool);
    
    </script>
</body>
</html>
