<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月球登陆</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:300px; background:rgba(0,0,0,0.3); border-radius:10px; padding:15px; margin:15px 0; }
        canvas { display:block; margin:0 auto; background:#1a1a2e; border-radius:5px; }
        button { padding:10px 25px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; }
        .score { font-size:0.9rem; margin-bottom:10px; }
        .controls { margin-top:10px; }
        .ctrl-btn { width:50px; height:50px; font-size:1.5rem; }
        .info { font-size:0.8rem; margin-top:10px; color:rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <div class="container">
        <h1>月球登陆</h1>
        <div class="score">燃料: <span id="fuel">100</span>% | 速度: <span id="speed">0</span> m/s | 高度: <span id="altitude">0</span>m</div>
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="300"></canvas>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="leftBtn">←</button>
            <button class="ctrl-btn" id="thrustBtn">🚀</button>
            <button class="ctrl-btn" id="rightBtn">→</button>
        </div>
        <button id="startBtn">开始游戏</button>
        <div class="message" id="message">控制飞船安全着陆到月球表面</div>
        <div class="info">安全着陆速度: < 10 m/s | 水平速度: < 5 m/s</div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fuelDisplay = document.getElementById('fuel');
        const speedDisplay = document.getElementById('speed');
        const altitudeDisplay = document.getElementById('altitude');
        const messageDisplay = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        
        let gameRunning = false;
        let animationId = null;
        
        const W = 400, H = 300;
        canvas.width = W;
        canvas.height = H;
        
        let lander = {
            x: W / 2,
            y: 50,
            vx: 0,
            vy: 0,
            fuel: 100,
            width: 30,
            height: 40
        };
        
        let gravity = 0.05;
        let thrustPower = 0.15;
        let landingPad = { x: W / 2 - 40, y: H - 30, width: 80, height: 10 };
        let terrain = [];
        let landed = false;
        
        function createTerrain() {
            terrain = [];
            let x = 0;
            while (x < W) {
                const height = Math.random() * 50 + H - 80;
                terrain.push({ x: x, y: height });
                x += Math.random() * 30 + 10;
            }
            terrain.push({ x: W, y: H - 30 });
        }
        
        function drawTerrain() {
            ctx.fillStyle = '#4a4a4a';
            ctx.beginPath();
            ctx.moveTo(0, H);
            terrain.forEach(t => ctx.lineTo(t.x, t.y));
            ctx.lineTo(W, H);
            ctx.closePath();
            ctx.fill();
            
            // 月球表面纹理
            ctx.fillStyle = '#3a3a3a';
            terrain.forEach(t => {
                ctx.beginPath();
                ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawLandingPad() {
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(landingPad.x, landingPad.y, landingPad.width, landingPad.height);
            
            // 着陆平台标记
            ctx.fillStyle = '#fff';
            ctx.font = '10px Arial';
            ctx.fillText('H', landingPad.x + landingPad.width / 2 - 5, landingPad.y + 8);
        }
        
        function drawLander() {
            ctx.save();
            ctx.translate(lander.x, lander.y);
            
            // 登陆舱主体
            ctx.fillStyle = '#bdc3c7';
            ctx.fillRect(-lander.width / 2, -lander.height / 2, lander.width, lander.height);
            
            // 登陆舱窗户
            ctx.fillStyle = '#3498db';
            ctx.fillRect(-8, -15, 16, 10);
            
            // 登陆舱腿
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-lander.width / 2, lander.height / 2);
            ctx.lineTo(-lander.width / 2 - 10, lander.height / 2 + 15);
            ctx.moveTo(lander.width / 2, lander.height / 2);
            ctx.lineTo(lander.width / 2 + 10, lander.height / 2 + 15);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawThrust() {
            if (lander.vy < -0.5 && lander.fuel > 0) {
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.moveTo(lander.x - 8, lander.y + lander.height / 2);
                ctx.lineTo(lander.x, lander.y + lander.height / 2 + 20 + Math.random() * 10);
                ctx.lineTo(lander.x + 8, lander.y + lander.height / 2);
                ctx.closePath();
                ctx.fill();
            }
        }
        
        function drawStars() {
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 37) % W;
                const y = (i * 23) % (H - 100);
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            
            drawStars();
            drawTerrain();
            drawLandingPad();
            drawThrust();
            drawLander();
        }
        
        function update() {
            // 重力
            lander.vy += gravity;
            
            // 更新位置
            lander.x += lander.vx;
            lander.y += lander.vy;
            
            // 边界检查
            if (lander.x < lander.width / 2) lander.x = lander.width / 2;
            if (lander.x > W - lander.width / 2) lander.x = W - lander.width / 2;
            
            // 更新显示
            const speed = Math.sqrt(lander.vx * lander.vx + lander.vy * lander.vy);
            speedDisplay.textContent = (speed * 10).toFixed(1);
            altitudeDisplay.textContent = Math.max(0, Math.floor(H - lander.y - lander.height / 2));
            fuelDisplay.textContent = Math.max(0, Math.floor(lander.fuel));
            
            // 检查着陆
            if (lander.y + lander.height / 2 >= landingPad.y) {
                lander.y = landingPad.y - lander.height / 2;
                
                const horizontalSpeed = Math.abs(lander.vx);
                const verticalSpeed = Math.abs(lander.vy);
                
                if (horizontalSpeed < 0.5 && verticalSpeed < 1) {
                    landed = true;
                    gameRunning = false;
                    messageDisplay.textContent = '完美着陆! 燃料剩余: ' + Math.floor(lander.fuel) + '%';
                    startBtn.textContent = '再来一次';
                } else {
                    gameRunning = false;
                    messageDisplay.textContent = '坠毁! 速度太快!';
                    startBtn.textContent = '重新开始';
                }
            }
            
            // 检查撞到地形
            for (let t of terrain) {
                if (lander.x > t.x - 20 && lander.x < t.x + 20 && 
                    lander.y + lander.height / 2 > t.y) {
                    gameRunning = false;
                    messageDisplay.textContent = '撞到月球表面了!';
                    startBtn.textContent = '重新开始';
                    break;
                }
            }
            
            // 燃料耗尽
            if (lander.fuel <= 0) {
                messageDisplay.textContent = '燃料耗尽! 小心着陆!';
            }
        }
        
        function thrust() {
            if (gameRunning && lander.fuel > 0) {
                lander.vy -= thrustPower;
                lander.fuel -= 0.5;
            }
        }
        
        function moveLeft() {
            if (gameRunning && lander.fuel > 0) {
                lander.vx -= thrustPower * 0.5;
                lander.fuel -= 0.3;
            }
        }
        
        function moveRight() {
            if (gameRunning && lander.fuel > 0) {
                lander.vx += thrustPower * 0.5;
                lander.fuel -= 0.3;
            }
        }
        
        function initGame() {
            lander.x = W / 2;
            lander.y = 50;
            lander.vx = (Math.random() - 0.5) * 2;
            lander.vy = 0;
            lander.fuel = 100;
            landed = false;
            
            createTerrain();
            
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowUp') thrust();
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });
        
        document.getElementById('leftBtn').addEventListener('click', moveLeft);
        document.getElementById('rightBtn').addEventListener('click', moveRight);
        document.getElementById('thrustBtn').addEventListener('click', thrust);
        
        startBtn.addEventListener('click', () => {
            gameRunning = true;
            messageDisplay.textContent = '游戏进行中...';
            startBtn.textContent = '重新开始';
            initGame();
        });
    </script>
</body>
</html>
