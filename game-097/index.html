<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>月球登陆</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>月球登陆</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">控制飞船安全着陆</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g97Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g97Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let lander = {x:W/2, y:50, vx:0, vy:0, fuel:100};
        let gravity = 0.05;
        let landingPad = {x:W/2-50, y:H-30, w:100};
        let terrain = [];
        
        for(let i=0;i<20;i++) terrain.push({x:i*20, y:H-30-Math.random()*40});
        
        function draw() {
            ctx.fillStyle='#1a1a2e';
            ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle='#fff';
            for(let i=0;i<50;i++) ctx.fillRect((i*37)%W,(i*23)%H,1,1);
            
            ctx.fillStyle='#4a4a4a';
            ctx.beginPath();ctx.moveTo(0,H);
            terrain.forEach(t=>ctx.lineTo(t.x,t.y));
            ctx.lineTo(W,H);ctx.closePath();ctx.fill();
            
            ctx.fillStyle='#2ecc71';
            ctx.fillRect(landingPad.x,landingPad.y,landingPad.w,10);
            
            ctx.fillStyle='#bdc3c7';
            ctx.fillRect(lander.x-12,lander.y-15,24,30);
            ctx.fillStyle='#3498db';
            ctx.fillRect(lander.x-6,lander.y-10,12,8);
            ctx.strokeStyle='#7f8c8d';ctx.lineWidth=2;
            ctx.beginPath();ctx.moveTo(lander.x-12,lander.y+15);ctx.lineTo(lander.x-18,lander.y+25);
            ctx.moveTo(lander.x+12,lander.y+15);ctx.lineTo(lander.x+18,lander.y+25);ctx.stroke();
            
            if(lander.vy<-0.5&&lander.fuel>0){
                ctx.fillStyle='#f39c12';
                ctx.beginPath();ctx.moveTo(lander.x-6,lander.y+15);ctx.lineTo(lander.x,lander.y+30+Math.random()*10);ctx.lineTo(lander.x+6,lander.y+15);ctx.fill();
            }
            
            ctx.fillStyle='#fff';ctx.font='14px Arial';
            ctx.fillText('燃料: '+Math.floor(lander.fuel)+'%',10,20);
            ctx.fillText('速度: '+(Math.sqrt(lander.vx*lander.vx+lander.vy*lander.vy)*10).toFixed(1)+' m/s',10,40);
            ctx.fillText('高度: '+Math.max(0,Math.floor(H-lander.y-15)),10,60);
        }
        
        function update() {
            lander.vy+=gravity;
            lander.x+=lander.vx;
            lander.y+=lander.vy;
            
            if(lander.x<15)lander.x=15;
            if(lander.x>W-15)lander.x=W-15;
            
            if(lander.y+15>=landingPad.y){
                lander.y=landingPad.y-15;
                const hs=Math.abs(lander.vx),vs=Math.abs(lander.vy);
                if(hs<0.5&&vs<1){messageDisplay.textContent='完美着陆! 燃料: '+Math.floor(lander.fuel)+'%';addScore(100+Math.floor(lander.fuel));}
                else messageDisplay.textContent='坠毁! 速度太快!';
                gameOver();
            }
        }
        
        function initGame(){lander={x:W/2,y:50,vx:(Math.random()-0.5)*2,vy:0,fuel:100};if(animationId)cancelAnimationFrame(animationId);gameLoop();}
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        function thrust(){if(lander.fuel>0){lander.vy-=0.15;lander.fuel-=0.5;}}
        function left(){if(lander.fuel>0){lander.vx-=0.08;lander.fuel-=0.3;}}
        function right(){if(lander.fuel>0){lander.vx+=0.08;lander.fuel-=0.3;}}
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowUp')thrust();
            if(e.key==='ArrowLeft')left();
            if(e.key==='ArrowRight')right();
        });
        document.getElementById('upBtn').onclick=thrust;
        document.getElementById('leftBtn').onclick=left;
        document.getElementById('rightBtn').onclick=right;
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
