<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>星际旅行</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>星际旅行</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">穿越星际</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g99Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g99Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let ship = {x:50, y:H/2, fuel:100};
        let stars = [];
        let planets = [];
        let distance = 0;
        
        for(let i=0;i<100;i++) stars.push({x:Math.random()*W,y:Math.random()*H,z:Math.random()*3+1});
        for(let i=0;i<3;i++) planets.push({x:W+Math.random()*200,y:Math.random()*H,size:20+Math.random()*20,color:['#e74c3c','#f39c12','#9b59b6'][i]});
        
        function draw() {
            ctx.fillStyle='#000';
            ctx.fillRect(0,0,W,H);
            
            ctx.fillStyle='#fff';
            stars.forEach(s=>{ctx.fillRect(s.x,s.y,s.z,s.z);});
            
            planets.forEach(p=>{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});
            
            ctx.fillStyle='#3498db';
            ctx.beginPath();ctx.moveTo(ship.x+15,ship.y);ctx.lineTo(ship.x-10,ship.y-8);ctx.lineTo(ship.x-5,ship.y);ctx.lineTo(ship.x-10,ship.y+8);ctx.fill();
            
            ctx.fillStyle='#fff';ctx.font='14px Arial';
            ctx.fillText('燃料: '+Math.floor(ship.fuel)+'%',10,20);
            ctx.fillText('距离: '+Math.floor(distance)+'光年',10,40);
        }
        
        function update() {
            distance+=0.5;
            ship.fuel-=0.05;
            
            stars.forEach(s=>{s.x-=s.z;if(s.x<0){s.x=W;s.y=Math.random()*H;}});
            
            planets.forEach(p=>{
                p.x-=2;
                if(p.x<-50){p.x=W+100;p.y=Math.random()*H;}
                if(Math.hypot(ship.x-p.x,ship.y-p.y)<p.size+10){messageDisplay.textContent='撞击行星!';gameOver();}
            });
            
            if(ship.fuel<=0){messageDisplay.textContent='燃料耗尽!';gameOver();}
            
            if(distance>500){messageDisplay.textContent='到达目的地!';gameOver();}
        }
        
        function initGame(){ship={x:50,y:H/2,fuel:100};distance=0;planets=[];for(let i=0;i<3;i++)planets.push({x:W+Math.random()*200,y:Math.random()*H,size:20+Math.random()*20,color:['#e74c3c','#f39c12','#9b59b6'][i]});if(animationId)cancelAnimationFrame(animationId);gameLoop();}
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft')ship.x=Math.max(15,ship.x-5);
            if(e.key==='ArrowRight')ship.x=Math.min(W-15,ship.x+5);
            if(e.key==='ArrowUp')ship.y=Math.max(15,ship.y-8);
            if(e.key==='ArrowDown')ship.y=Math.min(H-15,ship.y+8);
        });
        document.getElementById('leftBtn').onclick=()=>ship.x=Math.max(15,ship.x-5);
        document.getElementById('rightBtn').onclick=()=>ship.x=Math.min(W-15,ship.x+5);
        document.getElementById('upBtn').onclick=()=>ship.y=Math.max(15,ship.y-8);
        document.getElementById('downBtn').onclick=()=>ship.y=Math.min(H-15,ship.y+8);
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
