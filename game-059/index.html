<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>网球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>回击网球</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const court = document.createElement('div');
        court.style.cssText = 'width:280px;height:180px;background:#27ae60;border:3px solid white;margin:15px auto;position:relative;';
        
        let ballY = 10;
        let ballDir = 1;
        let paddleY = 80;
        
        function render() {
            court.innerHTML = '';
            const ball = document.createElement('div');
            ball.style.cssText = 'position:absolute;left:130px;top:'+ballY+'px;font-size:25px;';
            ball.textContent = '🎾';
            court.appendChild(ball);
            
            const paddle = document.createElement('div');
            paddle.style.cssText = 'position:absolute;right:10px;top:'+paddleY+'px;width:10px;height:50px;background:white;border-radius:5px;';
            court.appendChild(paddle);
        }
        
        setInterval(() => {
            ballY += ballDir * 5;
            if(ballY > 150) { ballDir = -1; }
            if(ballY < 10) { ballDir = 1; }
            
            if(ballY >= paddleY && ballY <= paddleY + 50 && ballDir === 1) {
                ballDir = -1;
                addScore(5);
                messageDisplay.textContent = '回击成功!';
            }
            render();
        }, 50);
        
        document.addEventListener('mousemove', e => {
            const rect = court.getBoundingClientRect();
            paddleY = Math.max(0, Math.min(130, e.clientY - rect.top - 25));
        });
        
        render();
        document.querySelector('.game-area').appendChild(court);
    
    </script>
</body>
</html>
