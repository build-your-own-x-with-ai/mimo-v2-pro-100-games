<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>网球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>回击网球</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const court = document.createElement('div');
        court.style.cssText = 'width:400px;height:250px;background:#27ae60;border:3px solid white;margin:15px auto;position:relative;overflow:hidden;';
        
        const net = document.createElement('div');
        net.style.cssText = 'position:absolute;left:195px;top:0;width:10px;height:250px;background:white;';
        court.appendChild(net);
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;width:15px;height:15px;background:#f1c40f;border-radius:50%;left:200px;top:120px;';
        court.appendChild(ball);
        
        const playerPaddle = document.createElement('div');
        playerPaddle.style.cssText = 'position:absolute;left:10px;top:110px;width:10px;height:60px;background:#e74c3c;border-radius:5px;';
        court.appendChild(playerPaddle);
        
        const aiPaddle = document.createElement('div');
        aiPaddle.style.cssText = 'position:absolute;right:10px;top:110px;width:10px;height:60px;background:#3498db;border-radius:5px;';
        court.appendChild(aiPaddle);
        
        let ballX = 200, ballY = 120, ballVX = 3, ballVY = 2;
        let playerY = 110, aiY = 110;
        const paddleWidth = 10, paddleHeight = 60;
        const courtWidth = 400, courtHeight = 250;
        
        function resetBall() {
            ballX = 200; ballY = 120; ballVX = 3; ballVY = 2;
        }
        
        function update() {
            ballX += ballVX;
            ballY += ballVY;
            
            if(ballY < 0 || ballY > courtHeight - 15) {
                ballVY = -ballVY;
                ballY = Math.max(0, Math.min(courtHeight - 15, ballY));
            }
            
            if(ballX < paddleWidth + 10 && ballY + 15 > playerY && ballY < playerY + paddleHeight) {
                ballVX = Math.abs(ballVX);
                addScore(10);
                messageDisplay.textContent = '玩家回击!';
            }
            
            if(ballX > courtWidth - paddleWidth - 10 - 15 && ballY + 15 > aiY && ballY < aiY + paddleHeight) {
                ballVX = -Math.abs(ballVX);
            }
            
            if(ballX < 0) {
                messageDisplay.textContent = 'AI得分!';
                setTimeout(resetBall, 1000);
                ballVX = 0; ballVY = 0;
            }
            
            if(ballX > courtWidth) {
                messageDisplay.textContent = '玩家得分!';
                addScore(50);
                setTimeout(resetBall, 1000);
                ballVX = 0; ballVY = 0;
            }
            
            const aiTarget = ballY - paddleHeight/2;
            aiY += (aiTarget - aiY) * 0.1;
            aiY = Math.max(0, Math.min(courtHeight - paddleHeight, aiY));
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
            playerPaddle.style.top = playerY + 'px';
            aiPaddle.style.top = aiY + 'px';
        }
        
        setInterval(update, 20);
        
        document.addEventListener('mousemove', e => {
            const rect = court.getBoundingClientRect();
            playerY = Math.max(0, Math.min(courtHeight - paddleHeight, e.clientY - rect.top - paddleHeight/2));
        });
        
        document.querySelector('.game-area').appendChild(court);
    
    </script>
</body>
</html>
