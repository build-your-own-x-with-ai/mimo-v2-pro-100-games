<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞镖游戏</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>飞镖游戏</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>投掷飞镖得分</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const field = document.createElement('div');
        field.style.cssText = 'width:400px;height:300px;background:#87ceeb;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const board = document.createElement('div');
        board.style.cssText = 'position:absolute;right:50px;top:50px;width:180px;height:180px;border-radius:50%;background:conic-gradient(#e74c3c 0deg 18deg,#2c3e50 18deg 36deg,#e74c3c 36deg 54deg,#2c3e50 54deg 72deg);border:10px solid #8b4513;';
        field.appendChild(board);
        
        const dart = document.createElement('div');
        dart.style.cssText = 'position:absolute;left:50px;top:140px;width:10px;height:30px;background:#e74c3c;border-radius:5px;';
        field.appendChild(dart);
        
        let dartX = 50, dartY = 140, dartVX = 0, dartVY = 0;
        let isDragging = false;
        let dragStartX, dragStartY;
        let isFlying = false;
        
        function resetDart() {
            dartX = 50; dartY = 140; dartVX = 0; dartVY = 0;
            isFlying = false;
        }
        
        function update() {
            if(isFlying) {
                dartX += dartVX;
                dartY += dartVY;
                
                if(dartX > 250 && dartX < 430 && dartY > 50 && dartY < 230) {
                    const targetX = 340, targetY = 140;
                    const dist = Math.sqrt((dartX - targetX)**2 + (dartY - targetY)**2);
                    if(dist < 20) {
                        addScore(50);
                        messageDisplay.textContent = '靶心! 50分';
                    } else if(dist < 50) {
                        addScore(25);
                        messageDisplay.textContent = '25分';
                    } else if(dist < 70) {
                        addScore(10);
                        messageDisplay.textContent = '10分';
                    } else {
                        messageDisplay.textContent = '脱靶!';
                    }
                    setTimeout(resetDart, 500);
                    dartVX = 0; dartVY = 0;
                }
                
                if(dartY > 280) {
                    resetDart();
                }
            }
            
            dart.style.left = dartX + 'px';
            dart.style.top = dartY + 'px';
        }
        
        field.addEventListener('mousedown', e => {
            if(!isFlying) {
                isDragging = true;
                const rect = field.getBoundingClientRect();
                dragStartX = e.clientX - rect.left;
                dragStartY = e.clientY - rect.top;
            }
        });
        
        field.addEventListener('mousemove', e => {
            if(isDragging) {
                const rect = field.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = dragStartX - mouseX;
                const dy = dragStartY - mouseY;
                dartX = dragStartX + dx * 0.5;
                dartY = dragStartY + dy * 0.5;
            }
        });
        
        field.addEventListener('mouseup', e => {
            if(isDragging) {
                isDragging = false;
                isFlying = true;
                const rect = field.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                dartVX = (dragStartX - mouseX) * 0.3;
                dartVY = (dragStartY - mouseY) * 0.3;
            }
        });
        
        field.addEventListener('mouseleave', () => {
            if(isDragging) {
                isDragging = false;
            }
        });
        
        setInterval(update, 20);
        document.querySelector('.game-area').appendChild(field);
    
    </script>
</body>
</html>
