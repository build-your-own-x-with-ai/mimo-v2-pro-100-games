<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>排球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>击球过网</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const court = document.createElement('div');
        court.style.cssText = 'width:400px;height:300px;background:#f39c12;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const net = document.createElement('div');
        net.style.cssText = 'position:absolute;left:195px;top:0;width:10px;height:300px;background:white;';
        court.appendChild(net);
        
        const ball = document.createElement('div');
        ball.style.cssText = 'position:absolute;width:20px;height:20px;background:white;border-radius:50%;left:200px;top:150px;';
        court.appendChild(ball);
        
        const player = document.createElement('div');
        player.style.cssText = 'position:absolute;left:50px;top:200px;width:30px;height:40px;background:#e74c3c;border-radius:5px;';
        court.appendChild(player);
        
        const ai = document.createElement('div');
        ai.style.cssText = 'position:absolute;right:50px;top:200px;width:30px;height:40px;background:#3498db;border-radius:5px;';
        court.appendChild(ai);
        
        let ballX = 200, ballY = 150, ballVX = 2, ballVY = 2;
        let playerX = 50, playerY = 200, aiX = 320, aiY = 200;
        const playerWidth = 30, playerHeight = 40;
        const courtWidth = 400, courtHeight = 300;
        let hits = 0;
        
        function resetBall() {
            ballX = 200; ballY = 150; ballVX = 2; ballVY = 2;
        }
        
        function update() {
            ballX += ballVX;
            ballY += ballVY;
            
            ballVY += 0.1;
            
            if(ballY < 0 || ballY > courtHeight - 20) {
                ballVY = -ballVY * 0.8;
                ballY = Math.max(0, Math.min(courtHeight - 20, ballY));
            }
            
            if(ballX < playerX + playerWidth && ballY + 20 > playerY && ballY < playerY + playerHeight) {
                ballVX = Math.abs(ballVX);
                ballVY = -Math.abs(ballVY) - 2;
                hits++;
                addScore(10);
                messageDisplay.textContent = '扣球! ' + hits + '次';
            }
            
            if(ballX > aiX - 20 && ballY + 20 > aiY && ballY < aiY + playerHeight) {
                ballVX = -Math.abs(ballVX);
                ballVY = -Math.abs(ballVY) - 1;
            }
            
            if(ballX < 0) {
                messageDisplay.textContent = 'AI得分!';
                setTimeout(resetBall, 1000);
                ballVX = 0; ballVY = 0;
            }
            
            if(ballX > courtWidth) {
                messageDisplay.textContent = '玩家得分!';
                addScore(50);
                setTimeout(resetBall, 1000);
                ballVX = 0; ballVY = 0;
            }
            
            const aiTargetX = ballX > courtWidth/2 ? ballX - 30 : 320;
            const aiTargetY = ballY - playerHeight/2;
            aiX += (aiTargetX - aiX) * 0.1;
            aiY += (aiTargetY - aiY) * 0.1;
            aiX = Math.max(courtWidth/2 + 20, Math.min(courtWidth - playerWidth, aiX));
            aiY = Math.max(0, Math.min(courtHeight - playerHeight, aiY));
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            ai.style.left = aiX + 'px';
            ai.style.top = aiY + 'px';
        }
        
        setInterval(update, 20);
        
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft') playerX = Math.max(0, playerX - 5);
            if(e.key === 'ArrowRight') playerX = Math.min(courtWidth/2 - playerWidth, playerX + 5);
            if(e.key === 'ArrowUp') playerY = Math.max(0, playerY - 5);
            if(e.key === 'ArrowDown') playerY = Math.min(courtHeight - playerHeight, playerY + 5);
        });
        
        document.querySelector('.game-area').appendChild(court);
    
    </script>
</body>
</html>
