<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>街头霸王</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white}.container{text-align:center;padding:20px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);max-width:600px;width:95%}h1{font-size:1.8rem;margin-bottom:10px}.game-area{min-height:300px;background:rgba(0,0,0,0.3);border-radius:10px;padding:15px;margin:15px 0}canvas{display:block;margin:0 auto;border-radius:5px}button{padding:10px 25px;font-size:1rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:20px;color:white;cursor:pointer;margin:5px}button:hover{background:rgba(255,255,255,0.3)}.message{font-size:1.1rem;margin-top:10px;min-height:20px;color:#51cf66}.score{font-size:0.9rem;margin-bottom:10px}.controls{margin-top:10px}.ctrl-btn{width:50px;height:50px;font-size:1.5rem}</style></head><body><div class="container"><h1>街头霸王</h1><div class="score">分数: <span id="score">0</span> | 最高分: <span id="best">0</span></div><div class="game-area"><canvas id="gameCanvas" width="400" height="300"></canvas></div><div class="controls"><button class="ctrl-btn" id="leftBtn">←</button><button class="ctrl-btn" id="upBtn">↑</button><button class="ctrl-btn" id="downBtn">↓</button><button class="ctrl-btn" id="rightBtn">→</button><button class="ctrl-btn" id="fireBtn">🔥</button></div><button id="startBtn">开始游戏</button><div class="message" id="message">格斗对战</div></div><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreDisplay=document.getElementById('score'),bestDisplay=document.getElementById('best'),messageDisplay=document.getElementById('message'),startBtn=document.getElementById('startBtn');let score=0,bestScore=localStorage.getItem('g83Best')||0,gameRunning=false,animationId=null;bestDisplay.textContent=bestScore;function addScore(n){score+=n;scoreDisplay.textContent=score;if(score>bestScore){bestScore=score;localStorage.setItem('g83Best',bestScore);bestDisplay.textContent=bestScore;}}function gameOver(){gameRunning=false;cancelAnimationFrame(animationId);messageDisplay.textContent='游戏结束! 得分: '+score;startBtn.textContent='重新开始';}
        const W=400, H=300;
        canvas.width=W; canvas.height=H;
        
        let p1 = {x:100, y:H-70, hp:100, state:'idle'};
        let p2 = {x:300, y:H-70, hp:100, state:'idle'};
        
        function draw() {
            ctx.fillStyle='#34495e';
            ctx.fillRect(0,0,W,H);
            ctx.fillStyle='#8B4513';
            ctx.fillRect(0,H-40,W,40);
            
            ctx.fillStyle='#3498db';
            ctx.fillRect(p1.x-20,p1.y-40,40,40);
            if(p1.state==='attack'){ctx.fillStyle='#f1c40f';ctx.fillRect(p1.x+20,p1.y-30,25,10);}
            
            ctx.fillStyle='#e74c3c';
            ctx.fillRect(p2.x-20,p2.y-40,40,40);
            if(p2.state==='attack'){ctx.fillStyle='#f1c40f';ctx.fillRect(p2.x-45,p2.y-30,25,10);}
            
            ctx.fillStyle='#2ecc71';
            ctx.fillRect(20,20,p1.hp*1.5,15);
            ctx.fillStyle='#e74c3c';
            ctx.fillRect(W-170,20,p2.hp*1.5,15);
            
            ctx.fillStyle='#fff';
            ctx.fillText('P1',20,50);ctx.fillText('P2',W-40,50);
        }
        
        function update() {
            if(p2.state==='idle'&&Math.random()<0.03)p2.state='attack';
            if(p2.state==='attack'){
                if(Math.abs(p1.x-p2.x)<60){p1.hp-=5;if(p1.hp<=0){messageDisplay.textContent='P2获胜!';gameOver();}}
                setTimeout(()=>p2.state='idle',300);
            }
            if(Math.random()<0.02)p2.x+=Math.random()>0.5?10:-10;
            p2.x=Math.max(100,Math.min(W-50,p2.x));
        }
        
        function initGame(){p1={x:100,y:H-70,hp:100,state:'idle'};p2={x:300,y:H-70,hp:100,state:'idle'};if(animationId)cancelAnimationFrame(animationId);gameLoop();}
        function gameLoop(){if(!gameRunning)return;update();draw();animationId=requestAnimationFrame(gameLoop);}
        function punch(){
            p1.state='attack';
            if(Math.abs(p1.x-p2.x)<60){p2.hp-=10;addScore(10);if(p2.hp<=0){messageDisplay.textContent='你获胜!';gameOver();}}
            setTimeout(()=>p1.state='idle',200);
        }
        
        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft')p1.x=Math.max(50,p1.x-10);
            if(e.key==='ArrowRight')p1.x=Math.min(W-50,p1.x+10);
            if(e.key===' ')punch();
        });
        document.getElementById('leftBtn').onclick=()=>p1.x=Math.max(50,p1.x-10);
        document.getElementById('rightBtn').onclick=()=>p1.x=Math.min(W-50,p1.x+10);
        document.getElementById('fireBtn').onclick=punch;
    startBtn.addEventListener('click',()=>{score=0;scoreDisplay.textContent=score;gameRunning=true;messageDisplay.textContent='游戏进行中...';startBtn.textContent='重新开始';initGame();});</script></body></html>
