<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽毛球</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
        .container { text-align:center; padding:20px; background:rgba(255,255,255,0.1); border-radius:20px; backdrop-filter:blur(10px); max-width:600px; width:95%; }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        .game-area { min-height:200px; background:rgba(255,255,255,0.15); border-radius:10px; padding:15px; margin:15px 0; }
        button { padding:10px 20px; font-size:1rem; background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); border-radius:20px; color:white; cursor:pointer; margin:5px; }
        button:hover { background:rgba(255,255,255,0.3); }
        .message { font-size:1.1rem; margin-top:10px; min-height:20px; color:#51cf66; }
        .score { font-size:0.9rem; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>羽毛球</h1>
        <div class="score">分数: <span id="score">0</span></div>
        <div class="game-area">
            <p>击打羽毛球</p>
        </div>
        <button onclick="location.reload()">重新开始</button>
        <div class="message" id="message"></div>
    </div>
    <script>
        let score = 0;
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');
        function addScore(n) { score += n; scoreDisplay.textContent = score; }
        
        const court = document.createElement('div');
        court.style.cssText = 'width:400px;height:300px;background:#3498db;border-radius:10px;margin:15px auto;position:relative;overflow:hidden;';
        
        const net = document.createElement('div');
        net.style.cssText = 'position:absolute;left:195px;top:0;width:10px;height:300px;background:white;';
        court.appendChild(net);
        
        const shuttle = document.createElement('div');
        shuttle.style.cssText = 'position:absolute;width:20px;height:20px;background:#f1c40f;border-radius:50%;left:200px;top:150px;';
        court.appendChild(shuttle);
        
        const playerRacket = document.createElement('div');
        playerRacket.style.cssText = 'position:absolute;left:10px;top:140px;width:15px;height:80px;background:#e74c3c;border-radius:5px;';
        court.appendChild(playerRacket);
        
        const aiRacket = document.createElement('div');
        aiRacket.style.cssText = 'position:absolute;right:10px;top:140px;width:15px;height:80px;background:#3498db;border-radius:5px;';
        court.appendChild(aiRacket);
        
        let shuttleX = 200, shuttleY = 150, shuttleVX = 2, shuttleVY = 2;
        let playerY = 140, aiY = 140;
        const racketWidth = 15, racketHeight = 80;
        const courtWidth = 400, courtHeight = 300;
        let hits = 0;
        
        function resetShuttle() {
            shuttleX = 200; shuttleY = 150; shuttleVX = 2; shuttleVY = 2;
        }
        
        function update() {
            shuttleX += shuttleVX;
            shuttleY += shuttleVY;
            
            shuttleVY += 0.1;
            
            if(shuttleY < 0 || shuttleY > courtHeight - 20) {
                shuttleVY = -shuttleVY * 0.8;
                shuttleY = Math.max(0, Math.min(courtHeight - 20, shuttleY));
            }
            
            if(shuttleX < racketWidth + 10 && shuttleY + 20 > playerY && shuttleY < playerY + racketHeight) {
                shuttleVX = Math.abs(shuttleVX);
                shuttleVY = -Math.abs(shuttleVY) - 1;
                hits++;
                addScore(10);
                messageDisplay.textContent = '击中! ' + hits + '次';
            }
            
            if(shuttleX > courtWidth - racketWidth - 10 - 20 && shuttleY + 20 > aiY && shuttleY < aiY + racketHeight) {
                shuttleVX = -Math.abs(shuttleVX);
                shuttleVY = -Math.abs(shuttleVY) - 1;
            }
            
            if(shuttleX < 0) {
                messageDisplay.textContent = 'AI得分!';
                setTimeout(resetShuttle, 1000);
                shuttleVX = 0; shuttleVY = 0;
            }
            
            if(shuttleX > courtWidth) {
                messageDisplay.textContent = '玩家得分!';
                addScore(50);
                setTimeout(resetShuttle, 1000);
                shuttleVX = 0; shuttleVY = 0;
            }
            
            const aiTarget = shuttleY - racketHeight/2;
            aiY += (aiTarget - aiY) * 0.08;
            aiY = Math.max(0, Math.min(courtHeight - racketHeight, aiY));
            
            shuttle.style.left = shuttleX + 'px';
            shuttle.style.top = shuttleY + 'px';
            playerRacket.style.top = playerY + 'px';
            aiRacket.style.top = aiY + 'px';
        }
        
        setInterval(update, 20);
        
        document.addEventListener('mousemove', e => {
            const rect = court.getBoundingClientRect();
            playerY = Math.max(0, Math.min(courtHeight - racketHeight, e.clientY - rect.top - racketHeight/2));
        });
        
        document.querySelector('.game-area').appendChild(court);
    
    </script>
</body>
</html>
